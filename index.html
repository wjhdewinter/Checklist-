<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC - Full Enterprise Inspector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 180px; }
        .container { max-width: 600px; margin: auto; }
        
        .header-box { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 15px; border: 1px solid #334155; position: relative; }
        .ts-label { position: absolute; top: 10px; right: 15px; font-size: 0.6rem; color: #64748b; }
        
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; box-sizing: border-box; }
        
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--success); }
        .check-item.fail { border-left-color: var(--danger); }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--success); }
        
        .fail-details { display: none; margin-top: 10px; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; }
        .fail .fail-details { display: block; }

        .sig-wrapper { background: white; border-radius: 8px; margin: 10px 0; overflow: hidden; border: 2px solid var(--accent); }
        canvas { width: 100%; height: 140px; touch-action: none; background: #fff; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.95); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; backdrop-filter: blur(10px); z-index: 1000; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-main { background: var(--danger); grid-column: span 2; font-size: 1.1rem; border: 2px solid #fb7185; }

        /* PDF LAYOUT (Zichtbaar tijdens renderen) */
        #pdf-render-area { display: none; background: white; color: black; width: 210mm; padding: 20mm; font-size: 10pt; }
        .pdf-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; margin: 0;">AMSTERDAM WAREHOUSE COMPANY</p>
        <h1 style="margin: 5px 0;">Professional Audit App</h1>
    </div>

    <div class="zone-card">
        <label style="font-size: 0.75rem; font-weight: bold;">INSPECTEUR NAAM:</label>
        <input type="text" id="user-name-inp" placeholder="Vul je naam in...">
        <div id="gps-info" style="font-size: 0.65rem; margin-top: 8px; color: #94a3b8;">📍 GPS Coördinaten niet vastgelegd</div>
        <button onclick="fetchGPS()" style="background:#475569; width:100%; padding:6px; margin-top:5px; font-size:0.7rem;">📍 VASTLEGGEN LOCATIE</button>
    </div>

    <div id="main-content"></div>

    <div class="zone-card">
        <label style="color: var(--accent); font-weight: bold; font-size: 0.8rem;">RECHTSGELDIGE HANDTEKENING:</label>
        <div class="sig-wrapper"><canvas id="sig-canvas"></canvas></div>
        <button onclick="signaturePad.clear()" style="background:#475569; width:100%; padding:5px; font-size:0.7rem;">WISSEN</button>
    </div>

    <div class="footer">
        <button style="background:#25D366;" onclick="shareWA()">WhatsApp</button>
        <button style="background:#0078d4;" onclick="shareMail()">E-mail</button>
        <button class="btn-main" onclick="generateOfficialPDF()">📄 GENEREER AWC RAPPORT</button>
    </div>
</div>

<div id="pdf-render-area">
    <div style="border-bottom: 3px solid #0f172a; padding-bottom: 10px;">
        <h1 style="margin:0; font-size: 20pt;">Amsterdam Warehouse Company</h1>
        <p style="margin:0; font-size: 12pt; color: #444;">Officieel Magazijn Inspectierapport</p>
    </div>
    
    <div style="margin-top: 15px; display: flex; justify-content: space-between;">
        <p><strong>Inspecteur:</strong> <span id="p-inspector"></span></p>
        <p><strong>Datum:</strong> <span id="p-date"></span></p>
    </div>
    <p id="p-gps" style="font-size: 8pt; color: #666; margin-top: 0;"></p>

    <table class="pdf-table">
        <thead><tr style="background:#f0f0f0;"><th>Zone</th><th>Checklist Item</th><th>Status</th><th>Details / Prio</th></tr></thead>
        <tbody id="p-tbody"></tbody>
    </table>

    <div style="margin-top: 40px; text-align: right;">
        <p><strong>Handtekening Willem:</strong></p>
        <img id="p-sig-img" style="width: 160px; border-bottom: 1px solid #000;">
    </div>
</div>

<script>
    const zonesConfig = [
        { n: "Hal A", t: "h" }, { n: "Hal B", t: "h" }, { n: "Hal C", t: "h" },
