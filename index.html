<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Inspector</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            padding-bottom: 120px;
        }

        .container { max-width: 500px; margin: auto; }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.3rem; margin: 0; color: var(--accent); }

        .zone-wrapper {
            background: var(--card);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid #334155;
        }

        .zone-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
        }

        .status-ok { background: var(--success); }

        .zone-content {
            display: none;
            padding: 15px;
            background: #16213e;
            border-top: 1px solid #334155;
        }

        .is-open .zone-content { display: block; }

        .check-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d3748;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        .footer-actions {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #000;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .btn-wa { background: #22c55e; }
        .btn-mail { background: #3b82f6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Warehouse Inspectie</h1>
    </header>

    <div id="main-list">
        </div>

    <div class="footer-actions">
        <button class="btn-wa" onclick="verzend('wa')">WhatsApp</button>
        <button class="btn-mail" onclick="verzend('mail')">E-mail</button>
    </div>
</div>

<script>
    const questions = {
        hal: ["Vloer vrij van folie/hout?", "Gangpaden vrij van pallets?", "Stellingen OK?", "Nooduitgang vrij?", "Verlichting OK?"],
        exp: ["Docks vrij?", "Geen losse folie/hout?", "Heftrucks aan lader?"],
        wc: ["Vloer schoon/droog?", "Zeep/papier OK?"]
    };

    const zones = [
        { n: "Hal A", t: "hal" }, { n: "Hal B", t: "hal" }, { n: "Hal C", t: "hal" },
        { n: "Hal D", t: "hal" }, { n: "Hal E", t: "hal" }, { n: "Hal F", t: "hal" },
        { n: "Hal G", t: "hal" }, { n: "Hal H", t: "hal" }, { n: "Entresol", t: "hal" },
        { n: "Expeditie 1", t: "exp" }, { n: "Expeditie 2", t: "exp" }, { n: "Expeditie 3", t: "exp" },
        { n: "Toiletten", t: "wc" }
    ];

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = zones.map(z => `
            <div class="zone-wrapper" id="w-${z.n}">
                <div class="zone-header" onclick="toggle('${z.n}')">
                    <span>${z.n}</span>
                    <div class="status-dot" id="d-${z.n}"></div>
                </div>
                <div class="zone-content">
                    ${questions[z.t].map((q, i) => `
                        <div class="check-item">
                            <input type="checkbox" id="q-${z.n}-${i}" onchange="check('${z.n}','${z.t}')">
                            <label>${q}</label>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function toggle(n) {
        document.getElementById(`w-${n}`).classList.toggle('is-open');
    }

    function check(n, t) {
        let all = true;
        questions[t].forEach((_, i) => {
            if(!document.getElementById(`q-${n}-${i}`).checked) all = false;
        });
        document.getElementById(`d-${n}`).className = all ? "status-dot status-ok" : "status-dot";
    }

    function verzend(m) {
        let r = "WAREHOUSE CHECK:%0A";
        zones.forEach(z => {
            let ok = true;
            questions[z.t].forEach((_, i) => {
                if(!document.getElementById(`q-${z.n}-${i}`).checked) ok = false;
            });
            r += (ok ? "✅" : "❌") + " " + z.n + "%0A";
        });
        window.open(m === 'wa' ? `https://wa.me/?text=${r}` : `mailto:?subject=Check&body=${r}`);
    }

    render();
</script>
</body>
</html>
