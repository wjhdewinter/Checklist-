<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC Professional Audit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 200px; }
        .container { max-width: 600px; margin: auto; }
        
        .header-box { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 15px; border: 1px solid #334155; position: relative; }
        
        .ts-label { position: absolute; top: 10px; right: 15px; font-size: 0.6rem; color: #64748b; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; box-sizing: border-box; }
        
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--success); }
        .check-item.fail { border-left-color: var(--danger); }
        .check-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        input[type="checkbox"] { width: 28px; height: 28px; accent-color: var(--success); flex-shrink: 0; }
        
        .fail-details { display: none; margin-top: 10px; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; }
        .fail .fail-details { display: block; }

        .sig-wrapper { background: white; border-radius: 8px; margin: 10px 0; overflow: hidden; border: 2px solid var(--accent); }
        canvas { width: 100%; height: 160px; touch-action: none; background: #fff; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.98); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 1000; border-top: 1px solid #334155; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-main { background: var(--danger); grid-column: span 2; font-size: 1.1rem; }

        #pdf-render-area { display: none; background: white; color: black; width: 210mm; padding: 20mm; }
        .pdf-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 9pt; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; margin: 0;">AMSTERDAM WAREHOUSE COMPANY</p>
        <h1 style="margin: 5px 0;">Warehouse Audit</h1>
    </div>

    <div class="zone-card">
        <label style="font-size: 0.75rem; font-weight: bold;">INSPECTEUR NAAM:</label>
        <input type="text" id="user-name" placeholder="Vul je naam in...">
        <button onclick="getLocation()" style="background:#475569; width:100%; padding:8px; margin-top:10px; font-size:0.7rem;">📍 VASTLEGGEN GPS LOCATIE</button>
        <div id="gps-status" style="font-size: 0.6rem; margin-top: 5px; color: #94a3b8; text-align: center;">Geen GPS data</div>
    </div>

    <div id="checklist">
        </div>

    <div class="zone-card">
        <label style="color: var(--accent); font-weight: bold; font-size: 0.8rem;">HANDTEKENING:</label>
        <div class="sig-wrapper"><canvas id="canvas"></canvas></div>
        <button onclick="sig.clear()" style="background:#475569; width:100%; padding:5px; font-size:0.7rem;">WISSEN</button>
    </div>

    <div class="footer">
        <button style="background:#25D366;" onclick="window.open('https://wa.me/')">WhatsApp</button>
        <button style="background:#0078d4;" onclick="window.location.href='mailto:'">E-mail</button>
        <button class="btn-main" onclick="makePDF()">📄 GENEREER AWC RAPPORT</button>
    </div>
</div>

<div id="pdf-area">
    <h1 style="margin:0;">Amsterdam Warehouse Company</h1>
    <p>Inspectierapport - <span id="p-date"></span></p>
    <p><strong>Inspecteur:</strong> <span id="p-name"></span> | <span id="p-gps"></span></p>
    <table class="pdf-table">
        <thead><tr style="background:#eee;"><th>Zone</th><th>Check</th><th>Status</th><th>Details</th></tr></thead>
        <tbody id="p-rows"></tbody>
    </table>
    <div style="margin-top:30px; text-align:right;">
        <p>Handtekening:</p>
        <img id="p-sig" style="width:150px; border-bottom:1px solid #000;">
    </div>
</div>

<script>
    const zones = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    const checks = ["Vloer vrij", "Stellingen OK", "Nooduitgang vrij", "Verlichting OK"];
    
    let sig, gps = "Niet vastgelegd";

    function init() {
        const container = document.getElementById('checklist');
        zones.forEach(z => {
            let html = `<div class="zone-card" onclick="this.querySelector('.ts-label').innerText='Bezocht: '+new Date().toLocaleTimeString()">
                <div class="ts-label">Nog niet bezocht</div>
                <strong style="color:var(--accent)">${z}</strong><br><br>`;
            
            checks.forEach((c, i) => {
                html += `
                <div class="check-item" id="item-${z}-${i}">
                    <div class="check-row">
                        <span>${c}</span>
                        <input type="checkbox" checked onchange="document.getElementById('item-${z}-${i}').classList.toggle('fail', !this.checked)">
                    </div>
                    <div class="fail-details">
                        <input type="text" id="detail-${z}-${i}" placeholder="Locatie/Opmerking...">
                        <select id="prio-${z}-${i}">
                            <option value="LAAG">Prioriteit: Laag</option>
                            <option value="MEDIUM">Prioriteit: Medium</option>
                            <option value="SPOED">SPOED</option>
                        </select>
                        <input type="file" style="margin-top:5px; font-size:0.7rem;">
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const cvs = document.getElementById('canvas');
        sig = new SignaturePad(cvs);
        
        const resize = () => {
            const r = Math.max(window.devicePixelRatio || 1, 1);
            cvs.width = cvs.offsetWidth * r; cvs.height = cvs.offsetHeight * r;
            cvs.getContext("2d").scale(r, r);
        };
        window.onresize = resize; resize();
    }

    function getLocation() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                gps = `Lat: ${p.coords.latitude.toFixed(4)}, Lon: ${p.coords.longitude.toFixed(4)}`;
                document.getElementById('gps-status').innerText = "📍 Geregistreerd: " + gps;
            });
        }
    }

    async function makePDF() {
        const n = document.getElementById('user-name').value;
        if(!n || sig.isEmpty()) return alert("Naam en handtekening verplicht!");

        document.getElementById('p-name').innerText = n;
        document.getElementById('p-date').innerText = new Date().toLocaleString();
        document.getElementById('p-gps').innerText = gps;
        document.getElementById('p-sig').src = sig.toDataURL();
        
        const rows = document.getElementById('p-rows');
        rows.innerHTML = "";
        
        zones.forEach(z => {
            checks.forEach((c, i) => {
                const ok = !document.getElementById(`item-${z}-${i}`).classList.contains('fail');
                const det = document.getElementById(`detail-${z}-${i}`).value;
                const prio = document.getElementById(`prio-${z}-${i}`).value;
                rows.innerHTML += `<tr>
                    <td>${i === 0 ? z : ""}</td>
                    <td>${c}</td>
                    <td style="color:${ok?'green':'red'}">${ok?'OK':'ACTIE'}</td>
                    <td>${!ok ? `[${prio}] ${det}` : '-'}</td>
                </tr>`;
            });
        });

        const el = document.getElementById('pdf-area');
        el.style.display = 'block';
        await html2pdf().from(el).set({ margin: 10, filename: 'AWC-Rapport.pdf', html2canvas: { scale: 2 } }).save();
        el.style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
