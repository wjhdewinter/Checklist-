<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC Audit V8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 180px; }
        .container { max-width: 600px; margin: auto; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 12px; padding: 15px; border: 1px solid #334155; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; }
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 5px solid #22c55e; }
        .check-item.is-fail { border-left-color: #ef4444; }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 35px; height: 35px; }
        .fail-ui { display: none; margin-top: 10px; }
        .is-fail .fail-ui { display: block; }
        .photo-input { margin-top: 10px; color: #94a3b8; font-size: 0.8rem; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 2px solid var(--accent); z-index: 1000; }
        button { padding: 18px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        
        /* PDF EXPORT STIJL - Simpel zwart op wit */
        #pdf-content { background: white; color: black; padding: 30px; display: none; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 10px; text-align: left; color: black !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="zone-card">
        <h2 style="text-align:center; color:var(--accent); margin:0;">AWC Magazijn Audit</h2>
        <p style="text-align:center; font-size:0.8rem; margin-bottom:15px;">Versie 8.0 - Stabiel</p>
        <label>Naam Inspecteur:</label>
        <input type="text" id="ins-name" placeholder="Naam invullen...">
    </div>

    <div id="zones-container"></div>

    <div class="footer">
        <button style="background:#25D366" onclick="sendWA()">WhatsApp</button>
        <button style="background:#0078d4" onclick="window.location.href='mailto:?subject=Audit'">E-mail</button>
        <button style="background:#ef4444; grid-column: span 2;" id="pdf-btn" onclick="makePDF()">📄 DOWNLOAD PDF RAPPORT</button>
    </div>
</div>

<div id="pdf-content">
    <h1 style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 10px;">AWC INSPECTIERAPPORT</h1>
    <p><strong>Inspecteur:</strong> <span id="r-name"></span></p>
    <p><strong>Datum:</strong> <span id="r-date"></span></p>
    <table class="pdf-table">
        <thead>
            <tr style="background:#eee;">
                <th>Zone</th>
                <th>Status</th>
                <th>Bevindingen / Details</th>
            </tr>
        </thead>
        <tbody id="r-body"></tbody>
    </table>
    <p style="margin-top: 50px; font-style: italic;">Gegenereerd via AWC Audit App</p>
</div>

<script>
    const zones = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    const options = ["Geen afwijking", "Folie/Hout op vloer", "Stellingschade", "Nooduitgang geblokkeerd", "Verlichting defect", "Overig..."];

    function buildApp() {
        const target = document.getElementById('zones-container');
        zones.forEach(z => {
            let menu = options.map(o => `<option value="${o}">${o}</option>`).join('');
            target.innerHTML += `
            <div class="zone-card">
                <div class="check-item" id="item-${z}">
                    <div class="check-row">
                        <strong>${z}</strong>
                        <input type="checkbox" checked onchange="document.getElementById('item-${z}').classList.toggle('is-fail', !this.checked)">
                    </div>
                    <div class="fail-ui">
                        <select id="sel-${z}">${menu}</select>
                        <input type="text" id="txt-${z}" placeholder="Locatie/Details...">
                        <input type="file" accept="image/*" class="photo-input">
                    </div>
                </div>
            </div>`;
        });
    }

    async function makePDF() {
        const name = document.getElementById('ins-name').value;
        const btn = document.getElementById('pdf-btn');
        if(!name) return alert("Voer eerst je naam in!");

        btn.innerText = "⏳ BEZIG MET OPSLAAN...";
        btn.disabled = true;

        document.getElementById('r-name').innerText = name;
        document.getElementById('r-date').innerText = new Date().toLocaleString('nl-NL');
        
        const tbody = document.getElementById('r-body');
        tbody.innerHTML = "";

        zones.forEach(z => {
            const fail = document.getElementById(`item-${z}`).classList.contains('is-fail');
            tbody.innerHTML += `<tr>
                <td><b>${z}</b></td>
                <td style="color:${fail?'red':'green'}">${fail?'AFWIJKING':'OK'}</td>
                <td>${fail ? document.getElementById(`sel-${z}`).value + " (" + document.getElementById(`txt-${z}`).value + ")" : 'Geen bijzonderheden'}</td>
            </tr>`;
        });

        const report = document.getElementById('pdf-content');
        report.style.display = 'block';

        const config = {
            margin: 10,
            filename: `Audit_${name}.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(report).set(config).save().then(() => {
            report.style.display = 'none';
            btn.innerText = "📄 DOWNLOAD PDF RAPPORT";
            btn.disabled = false;
        });
    }

    function sendWA() {
        const name = document.getElementById('ins-name').value || "Inspecteur";
        window.open(`https://api.whatsapp.com/send?text=AWC Audit door ${name} is voltooid.`);
    }

    window.onload = buildApp;
</script>
</body>
</html>
