<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC - Digital Sign</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 180px; }
        .container { max-width: 600px; margin: auto; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; padding: 15px; }
        h1 { color: var(--accent); text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        .check-item { display: flex; align-items: center; margin: 8px 0; border-bottom: 1px solid #2d3748; padding-bottom: 5px; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--success); }
        
        /* Signature Area */
        .signature-container { background: white; border-radius: 8px; margin-top: 15px; padding: 10px; }
        canvas { width: 100%; height: 150px; border: 1px dashed #ccc; touch-action: none; }
        .sig-label { font-size: 0.8rem; color: #64748b; margin-bottom: 5px; display: block; }
        
        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-pdf { background: #e11d48; grid-column: span 2; font-size: 1.1rem; }
        .btn-clear { background: #475569; font-size: 0.7rem; padding: 5px; margin-top: 5px; width: 100%; }

        /* PDF TEMPLATE */
        #pdf-content { background: white; color: #1a1a1a; padding: 40px; display: none; }
        .pdf-header { border-bottom: 4px solid #0f172a; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 9pt; }
        .pdf-table th, .pdf-table td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; }
        .sig-image-pdf { width: 150px; height: auto; border-bottom: 1px solid #000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p style="text-align: center; font-size: 0.6rem; color: #64748b; margin-bottom: 5px;">AMSTERDAM WAREHOUSE COMPANY</p>
        <h1>Warehouse Inspectie</h1>
    </header>
    
    <div id="main-list"></div>

    <div class="zone-card">
        <span class="sig-label">ZET HIER JE DIGITALE HANDTEKENING:</span>
        <div class="signature-container">
            <canvas id="signature-pad"></canvas>
        </div>
        <button class="btn-clear" onclick="clearSig()">Handtekening wissen</button>
    </div>

    <div class="footer-actions">
        <button style="background:#25D366" onclick="verzend('wa')">WhatsApp</button>
        <button style="background:#0078d4" onclick="verzend('mail')">E-mail</button>
        <button class="btn-pdf" onclick="maakPDF()">📄 GENEREER GETEKEND RAPPORT</button>
    </div>
</div>

<div id="pdf-content">
    <div class="pdf-header">
        <div>
            <h2 style="margin:0; color:#0f172a;">Amsterdam Warehouse Company</h2>
            <p style="margin:0; color:#64748b;">Officieel Inspectierapport</p>
        </div>
        <div style="text-align:right; font-size: 9pt;">
            <p id="pdf-date"></p>
            <p>Inspecteur: Willem</p>
        </div>
    </div>
    <table class="pdf-table">
        <thead><tr><th>Locatie</th><th>Punt</th><th>Status</th></tr></thead>
        <tbody id="pdf-body"></tbody>
    </table>
    <div style="margin-top: 40px; text-align: right;">
        <p style="font-size: 9pt; margin-bottom: 5px;"><strong>Handtekening:</strong></p>
        <img id="pdf-sig-img" class="sig-image-pdf">
    </div>
</div>

<script>
    const questions = {
        hal: ["Vloer vrij (folie/hout)?", "Gangpaden vrij (pallets)?", "Stellingen OK?", "Nooduitgangen vrij?", "Verlichting OK?"],
        exp: ["Docks vrij van rommel?", "Geen losse folie/hout?", "Heftrucks aan lader?"],
        wc: ["Vloer schoon/droog?", "Hygiëne OK?"]
    };
    const zones = [
        { n: "Hal A", t: "hal" }, { n: "Hal B", t: "hal" }, { n: "Hal C", t: "hal" },
        { n: "Hal D", t: "hal" }, { n: "Hal E", t: "hal" }, { n: "Hal F", t: "hal" },
        { n: "Hal G", t: "hal" }, { n: "Hal H", t: "hal" }, { n: "Entresol", t: "hal" },
        { n: "Exp 1", t: "exp" }, { n: "Exp 2", t: "exp" }, { n: "Exp 3", t: "exp" },
        { n: "Toiletten", t: "wc" }
    ];

    let signaturePad;

    function init() {
        const list = document.getElementById('main-list');
        list.innerHTML = zones.map(z => `
            <div class="zone-card">
                <strong style="color:var(--accent);">${z.n}</strong>
                ${questions[z.t].map((q, i) => `
                    <div class="check-item">
                        <input type="checkbox" id="q-${z.n}-${i}"><label>${q}</label>
                    </div>`).join('')}
            </div>`).join('');
        
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas);
        
        // Resize canvas for mobile
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function clearSig() { signaturePad.clear(); }

    function maakPDF() {
        if (signaturePad.isEmpty()) {
            alert("Zet eerst je handtekening!");
            return;
        }

        const body = document.getElementById('pdf-body');
        document.getElementById('pdf-date').innerText = "Datum: " + new Date().toLocaleDateString('nl-NL');
        body.innerHTML = "";

        zones.forEach(z => {
            questions[z.t].forEach((q, i) => {
                const checked = document.getElementById(`q-${z.n}-${i}`).checked;
                body.innerHTML += `<tr><td>${i === 0 ? z.n : ""}</td><td>${q}</td><td>${checked ? 'OK' : 'ACTIE'}</td></tr>`;
            });
        });

        // Zet handtekening in PDF
        document.getElementById('pdf-sig-img').src = signaturePad.toDataURL();

        const element = document.getElementById('pdf-content');
        element.style.display = 'block';
        html2pdf().set({
            margin: 10,
            filename: `AWC_Rapport_${new Date().toLocaleDateString()}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save().then(() => element.style.display = 'none');
    }

    function verzend(m) {
        let r = "*AWC INSPECTIE*%0A";
        zones.forEach(z => {
            let ok = true;
            questions[z.t].forEach((_, i) => { if(!document.getElementById(`q-${z.n}-${i}`).checked) ok = false; });
            r += (ok ? "✅" : "⚠️") + " " + z.n + "%0A";
        });
        window.open(m === 'wa' ? `https://wa.me/?text=${r}` : `mailto:?subject=AWC&body=${r}`);
    }

    window.onload = init;
</script>
</body>
</html>
