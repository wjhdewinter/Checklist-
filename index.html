<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC Warehouse Tools FULL PRO - PDF FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --dark:#020617;
  --accent:#ff6a00;
  --ok:#22c55e;
  --bad:#ef4444;
  --urgent:#f97316;
  --wa:#25D366;
  --blue:#2563eb;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
  margin:0;
  padding:12px;
  padding-bottom:175px;
}
.container{max-width:820px;margin:auto}
.header{
  background:linear-gradient(135deg,#1e293b,#020617);
  border:1px solid #334155;
  border-radius:18px;
  padding:18px;
  text-align:center;
  margin-bottom:12px;
}
.logo{
  width:210px;
  max-width:90%;
  background:white;
  border-radius:12px;
  padding:8px;
  display:block;
  margin:0 auto 10px;
}
.card{
  background:var(--card);
  border:1px solid #334155;
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}
h1{margin:0;font-size:1.35rem}
.sub{color:var(--muted);font-size:.9rem;margin:6px 0 0}
label{display:block;margin-top:10px;font-weight:bold}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:9px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  font-size:1rem;
}
textarea{min-height:75px;resize:vertical}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check{
  background:#111827;
  border-left:6px solid var(--ok);
  border-radius:12px;
  padding:12px;
}
.check.fail{border-left-color:var(--bad)}
.check.urgent{border-left-color:var(--urgent);box-shadow:0 0 0 1px rgba(249,115,22,.5)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.checkbox{width:36px;height:36px;accent-color:var(--ok)}
.failbox{display:none;margin-top:12px;border-top:1px solid #475569;padding-top:10px}
.fail .failbox{display:block}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.preview-grid img{width:100%;height:85px;object-fit:cover;border-radius:8px;border:1px solid #475569}
#signature{width:100%;height:190px;background:white;border-radius:10px;display:block;touch-action:none}
.score{
  background:#052e16;
  border:1px solid #22c55e;
  color:#dcfce7;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.alert{
  display:none;
  background:#7f1d1d;
  border:1px solid #f97316;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#020617;
  border-top:2px solid var(--accent);
  padding:10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  z-index:9999;
}
button{
  border:0;
  border-radius:10px;
  padding:14px;
  font-weight:bold;
  color:white;
  font-size:.95rem;
}
button:disabled{opacity:.55}
.btn-wa{background:var(--wa);color:#052e16}
.btn-pdf{background:var(--blue)}
.btn-mail{background:var(--accent);grid-column:span 2}
.btn-clear{background:#475569;width:100%;margin-top:8px}
.btn-ok{background:#16a34a;width:100%;margin-top:8px}

/* PDF FIX: dit element blijft zichtbaar en renderbaar */
#pdf-wrap{
  display:block;
  background:#0f172a;
  padding-top:10px;
}
#pdf{
  display:block !important;
  background:white;
  color:#0f172a;
  padding:22px;
  margin-top:18px;
  border-radius:8px;
  width:794px;
  max-width:794px;
  min-height:1123px;
}
.pdf-head{
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom:4px solid #ff6a00;
  padding-bottom:12px;
}
.pdf-head img{width:150px;background:white}
.metric{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:15px 0}
.metric div{padding:10px;border-radius:10px;color:white;text-align:center}
.m1{background:#2563eb}.m2{background:#16a34a}.m3{background:#f97316}.m4{background:#dc2626}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #cbd5e1;padding:7px;font-size:10px;vertical-align:top}
th{background:#0f172a;color:white}
.pdf-photo{width:80px;height:60px;object-fit:cover;border-radius:5px}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
#p-sign{width:230px;height:105px;object-fit:contain;border-bottom:1px solid #000;background:white}

@media(max-width:650px){
  .grid{grid-template-columns:1fr}
  .preview-grid{grid-template-columns:repeat(2,1fr)}
  .metric{grid-template-columns:1fr 1fr}
  #pdf{width:794px;max-width:794px}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <img src="logo.png" class="logo" alt="AWC logo">
  <h1>AWC Warehouse Tools FULL PRO</h1>
  <p class="sub">PDF FIX · WhatsApp PRO · Foto’s · Handtekening</p>
</div>

<div id="alert" class="alert">🚨 SPOED gedetecteerd</div>
<div id="score" class="score"></div>

<div class="card">
  <div class="grid">
    <div>
      <label>Gebruiker</label>
      <select id="user">
        <option>Willem</option>
        <option>Teamleider</option>
        <option>Medewerker 1</option>
        <option>Medewerker 2</option>
        <option>Expeditie</option>
        <option>BHV</option>
      </select>
    </div>
    <div>
      <label>Dienst</label>
      <select id="shift">
        <option>Ochtend</option>
        <option>Middag</option>
        <option>Avond</option>
        <option>Nacht</option>
      </select>
    </div>
  </div>

  <label>Locatie</label>
  <select id="location" onchange="updateScore()">
    <option>Hal A</option><option>Hal B</option><option>Hal C</option><option>Hal D</option>
    <option>Hal E</option><option>Hal F</option><option>Hal G</option><option>Hal H</option>
    <option>Expeditie 1</option><option>Expeditie 2</option><option>Expeditie 3</option>
    <option>Entresol</option><option>Toiletten</option><option>Buitenterrein</option>
  </select>

  <label>Module</label>
  <select id="module" onchange="renderList()">
    <option value="daily">Dagelijkse checklist</option>
    <option value="reachtruck">Reachtruck / heftruck</option>
    <option value="loading">Laad / los controle</option>
    <option value="cleaning">Schoonmaak</option>
    <option value="inbound">Inkomende goederen</option>
    <option value="outbound">Uitgaande goederen</option>
    <option value="return">Retouren</option>
    <option value="bhv">BHV inspectie</option>
    <option value="technical">Technische dienst</option>
    <option value="leader">Teamleider inspectie</option>
  </select>
</div>

<div id="list"></div>

<div class="card">
  <label>Algemene opmerkingen</label>
  <textarea id="notes" placeholder="Extra opmerkingen..."></textarea>
  <button class="btn-ok" onclick="markAllOk()">Alles OK</button>
</div>

<div class="card">
  <label>Handtekening</label>
  <canvas id="signature"></canvas>
  <button class="btn-clear" onclick="clearSig()">Wis handtekening</button>
</div>

<div id="pdf-wrap">
  <div id="pdf">
    <div class="pdf-head">
      <img src="logo.png" alt="AWC logo">
      <div>
        <h2 id="p-title">AWC Rapport</h2>
        <p id="p-date"></p>
      </div>
    </div>

    <div class="metric">
      <div class="m1"><b id="p-score">0%</b><br>Score</div>
      <div class="m2"><b id="p-ok">0</b><br>OK</div>
      <div class="m3"><b id="p-actions">0</b><br>Acties</div>
      <div class="m4"><b id="p-urgent">0</b><br>SPOED</div>
    </div>

    <p><b>Locatie:</b> <span id="p-location"></span> | <b>Gebruiker:</b> <span id="p-user"></span> | <b>Dienst:</b> <span id="p-shift"></span></p>

    <table>
      <thead>
        <tr><th>Punt</th><th>Status</th><th>Details</th><th>Prio</th><th>Foto</th></tr>
      </thead>
      <tbody id="p-body"></tbody>
    </table>

    <p><b>Opmerkingen:</b></p>
    <p id="p-notes"></p>

    <p style="text-align:right">
      <b>Handtekening:</b><br>
      <img id="p-sign">
    </p>
  </div>
</div>

</div>

<div class="footer">
  <button class="btn-wa" onclick="sendWhatsApp()">💬 WhatsApp</button>
  <button class="btn-pdf" onclick="downloadPDF()">📄 Alleen PDF</button>
  <button class="btn-mail" onclick="pdfMail()">📧 PDF + Mail</button>
</div>

<script>
const MAIL_TO = "willem@amsterdamwarehouse.com";

const moduleData = {
  daily:["Looppaden vrij","Docks schoon en veilig","Nooduitgangen vrij","Afval verwijderd","Pallets correct gestapeld","Vloer schoon en droog","Verlichting in orde","Geen schade aan stellingen"],
  reachtruck:["Accu opgeladen","Geen lekkage zichtbaar","Banden / wielen in orde","Remmen werken","Hefmast in orde","Vorken onbeschadigd","Claxon werkt","Verlichting werkt","Veiligheidsgordel aanwezig","Geen zichtbare schade"],
  loading:["Trailer stabiel","Dock veilig","Wielblokken geplaatst","Lading gezekerd","Geen zichtbare schade","Papieren compleet","Dockdeur veilig","Werkgebied vrij"],
  cleaning:["Vloer schoon","Afval verwijderd","Werkplek netjes","Geen obstakels","Stof / vuil verwijderd","Afvalbakken geleegd","Toiletten schoon indien van toepassing"],
  inbound:["Aantal klopt","Geen transportschade","Labels correct","Product komt overeen met order","Verpakking intact","Documenten aanwezig","Foto bij afwijking toegevoegd"],
  outbound:["Juiste order","Correct verpakt","Labels juist","Geen schade","Documenten compleet","Pallet stabiel","Lading gereed"],
  return:["Retour ontvangen","Verpakking gecontroleerd","Product gecontroleerd","Schade zichtbaar","Aantal gecontroleerd","Label / ordernummer aanwezig","Foto bewijs toegevoegd"],
  bhv:["Nooduitgangen vrij","Vluchtwegen vrij","Brandblussers bereikbaar","EHBO materiaal aanwezig","Verzamelplaats vrij","Noodverlichting zichtbaar","Brandmelders vrij"],
  technical:["Storing omschreven","Locatie duidelijk","Foto toegevoegd","Prioriteit bepaald","Veiligheid beoordeeld","Opvolging nodig"],
  leader:["Werkplek netjes","Team werkt veilig","Productiviteit op orde","Instructies duidelijk","Materialen aanwezig","Knelpunten gemeld","Communicatie op orde"]
};

const issues = ["Rommel / obstakel","Blokkade","Vuil / afval","Schade","Onveilige situatie","Lekkage","Defect","Overig"];
let sigPad;

function renderList(){
  const list = document.getElementById("list");
  const key = document.getElementById("module").value;
  list.innerHTML = "";

  moduleData[key].forEach((item,i)=>{
    list.insertAdjacentHTML("beforeend",`
      <div class="card">
        <div class="check" id="card_${i}">
          <div class="row">
            <div><b>${item}</b><br><small style="color:#94a3b8">Aan = OK / Uit = actiepunt</small></div>
            <input class="checkbox" type="checkbox" checked onchange="toggleFail(${i},this.checked)">
          </div>

          <div class="failbox">
            <label>Afwijking</label>
            <select id="issue_${i}">
              ${issues.map(x=>`<option>${x}</option>`).join("")}
            </select>

            <label>Details</label>
            <textarea id="detail_${i}" placeholder="Details / locatie / actie..."></textarea>

            <label>Prioriteit</label>
            <select id="prio_${i}" onchange="updateScore()">
              <option>LAAG</option>
              <option>MEDIUM</option>
              <option>SPOED</option>
            </select>

            <label>Foto's</label>
            <input type="file" multiple accept="image/*" id="photo_${i}" onchange="preview(${i})">
            <div class="preview-grid" id="prev_${i}"></div>
          </div>
        </div>
      </div>
    `);
  });

  updateScore();
}

function toggleFail(i,checked){
  document.getElementById("card_"+i).classList.toggle("fail",!checked);
  updateScore();
}

function preview(i){
  const box = document.getElementById("prev_"+i);
  box.innerHTML = "";
  const files = document.getElementById("photo_"+i).files;
  Array.from(files).slice(0,6).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => box.insertAdjacentHTML("beforeend",`<img src="${e.target.result}">`);
    reader.readAsDataURL(file);
  });
}

function getReport(){
  const key = document.getElementById("module").value;
  let ok = 0;
  let actions = [];
  let urgent = [];

  moduleData[key].forEach((item,i)=>{
    const fail = document.getElementById("card_"+i).classList.contains("fail");
    if(!fail){ ok++; return; }

    const obj = {
      item,
      issue:document.getElementById("issue_"+i).value,
      detail:document.getElementById("detail_"+i).value,
      prio:document.getElementById("prio_"+i).value,
      i
    };

    actions.push(obj);
    if(obj.prio === "SPOED") urgent.push(obj);
  });

  return {
    ok,
    actions,
    urgent,
    total:moduleData[key].length,
    score:Math.round(ok / moduleData[key].length * 100)
  };
}

function updateScore(){
  const r = getReport();
  document.getElementById("score").innerHTML = `📊 Score <b>${r.score}%</b> · ✅ ${r.ok}/${r.total} · ⚠️ ${r.actions.length} · 🚨 ${r.urgent.length}`;
  document.getElementById("alert").style.display = r.urgent.length ? "block" : "none";

  r.actions.forEach(a=>{
    document.getElementById("card_"+a.i).classList.toggle("urgent",a.prio==="SPOED");
  });
}

function markAllOk(){
  const key = document.getElementById("module").value;
  moduleData[key].forEach((_,i)=>{
    const cb = document.querySelector(`#card_${i} .checkbox`);
    cb.checked = true;
    toggleFail(i,true);
  });
}

function buildWhatsAppMessage(){
  const NL = String.fromCharCode(10);
  const r = getReport();
  let lines = [];

  lines.push(r.urgent.length ? "🚨 *AWC SPOED MELDING*" : "📋 *AWC WAREHOUSE RAPPORT*");
  lines.push("━━━━━━━━━━━━━━");
  lines.push("🏢 *Locatie:* " + document.getElementById("location").value);
  lines.push("🧰 *Module:* " + document.getElementById("module").selectedOptions[0].text);
  lines.push("👤 *Gebruiker:* " + document.getElementById("user").value);
  lines.push("🕒 *Dienst:* " + document.getElementById("shift").value);
  lines.push("📅 *Datum:* " + new Date().toLocaleString("nl-NL"));
  lines.push("━━━━━━━━━━━━━━");
  lines.push("");
  lines.push("📊 *SCORE:* " + r.score + "%");
  lines.push("✅ OK: " + r.ok + "/" + r.total);
  lines.push("⚠️ Acties: " + r.actions.length);
  lines.push("🚨 SPOED: " + r.urgent.length);

  if(r.actions.length){
    lines.push("");
    lines.push("━━━━━━━━━━━━━━");
    lines.push("*ACTIEPUNTEN*");
    lines.push("━━━━━━━━━━━━━━");

    r.actions.forEach((a,i)=>{
      lines.push((i+1) + ". " + (a.prio==="SPOED" ? "🚨" : "⚠️") + " *" + a.item + "*");
      lines.push("   • Reden: " + a.issue);
      if(a.detail) lines.push("   • Details: " + a.detail);
      lines.push("   • Prio: " + a.prio);
      lines.push("");
    });
  } else {
    lines.push("");
    lines.push("✅ *Geen actiepunten gevonden.*");
  }

  const note = document.getElementById("notes").value;
  if(note){
    lines.push("");
    lines.push("📝 *OPMERKING*");
    lines.push(note);
  }

  lines.push("");
  lines.push("━━━━━━━━━━━━━━");
  lines.push("📎 PDF is apart gegenereerd vanuit de AWC app.");

  return lines.join(NL);
}

function sendWhatsApp(){
  window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(buildWhatsAppMessage()), "_blank");
}

function fileToData(file){
  return new Promise(resolve=>{
    if(!file) return resolve("");
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function preparePDF(){
  const r = getReport();
  const key = document.getElementById("module").value;

  document.getElementById("p-title").innerText = "AWC " + document.getElementById("module").selectedOptions[0].text;
  document.getElementById("p-date").innerText = new Date().toLocaleString("nl-NL");
  document.getElementById("p-score").innerText = r.score + "%";
  document.getElementById("p-ok").innerText = r.ok + "/" + r.total;
  document.getElementById("p-actions").innerText = r.actions.length;
  document.getElementById("p-urgent").innerText = r.urgent.length;
  document.getElementById("p-location").innerText = document.getElementById("location").value;
  document.getElementById("p-user").innerText = document.getElementById("user").value;
  document.getElementById("p-shift").innerText = document.getElementById("shift").value;
  document.getElementById("p-notes").innerText = document.getElementById("notes").value || "-";
  document.getElementById("p-sign").src = sigPad.toDataURL("image/png");

  const body = document.getElementById("p-body");
  body.innerHTML = "";

  for(let i=0;i<moduleData[key].length;i++){
    const fail = document.getElementById("card_"+i).classList.contains("fail");
    const files = document.getElementById("photo_"+i).files;

    let photos = "-";
    if(fail && files.length){
      let arr = [];
      for(const file of Array.from(files).slice(0,4)){
        const data = await fileToData(file);
        arr.push(`<img class="pdf-photo" src="${data}">`);
      }
      photos = `<div class="pdf-grid">${arr.join("")}</div>`;
    }

    body.insertAdjacentHTML("beforeend",`
      <tr>
        <td><b>${moduleData[key][i]}</b></td>
        <td>${fail ? "ACTIE" : "OK"}</td>
        <td>${fail ? document.getElementById("issue_"+i).value + "<br>" + document.getElementById("detail_"+i).value : "In orde"}</td>
        <td>${fail ? document.getElementById("prio_"+i).value : "-"}</td>
        <td>${photos}</td>
      </tr>
    `);
  }

  await new Promise(resolve => setTimeout(resolve, 900));
}

async function downloadPDF(){
  if(sigPad.isEmpty()) return alert("Handtekening verplicht");

  const btns = document.querySelectorAll("button");
  btns.forEach(b=>b.disabled=true);

  try{
    await preparePDF();

    const element = document.getElementById("pdf");

    const opt = {
      margin: 8,
      filename: "AWC_rapport.pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: "#ffffff",
        scrollX: 0,
        scrollY: 0,
        windowWidth: 794
      },
      jsPDF: {
        unit: "mm",
        format: "a4",
        orientation: "portrait"
      },
      pagebreak: { mode: ["css", "legacy"] }
    };

    await html2pdf().set(opt).from(element).save();

  }catch(err){
    alert("Fout bij PDF maken: " + err.message);
  }finally{
    btns.forEach(b=>b.disabled=false);
  }
}

async function pdfMail(){
  await downloadPDF();
  window.location.href = "mailto:" + MAIL_TO + "?subject=AWC Rapport&body=" + encodeURIComponent(buildWhatsAppMessage().replaceAll("*",""));
}

function clearSig(){ sigPad.clear(); }

function resizeSignature(){
  const canvas = document.getElementById("signature");
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  canvas.getContext("2d").scale(ratio, ratio);
  if(sigPad) sigPad.clear();
}

window.onload = () => {
  renderList();
  const canvas = document.getElementById("signature");
  sigPad = new SignaturePad(canvas,{backgroundColor:"white"});
  resizeSignature();
};
window.onresize = resizeSignature;
</script>

</body>
</html>
