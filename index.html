<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC - Enterprise Inspector V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 180px; }
        .container { max-width: 600px; margin: auto; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: var(--accent); text-align: center; font-size: 1.3rem; margin: 5px 0; text-transform: uppercase; }
        
        .input-group label { display: block; font-size: 0.75rem; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }

        .check-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--success); }
        .check-item.has-action { border-left-color: var(--danger); }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--success); }
        
        .extra-info { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; }
        .has-action .extra-info { display: block; }
        
        .preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid var(--accent); }

        .sig-box { background: white; border-radius: 8px; margin-top: 10px; }
        canvas { width: 100%; height: 140px; touch-action: none; border-radius: 8px; }

        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,23,42,0.95); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; backdrop-filter: blur(8px); border-top: 1px solid #334155; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-pdf { background: var(--danger); grid-column: span 2; font-size: 1.1rem; }

        /* PDF HIDDEN AREA */
        #pdf-render { display: none; background: white; color: black; padding: 15mm; width: 180mm; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 10pt; }
        .pdf-photo { width: 120px; height: auto; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p style="text-align: center; font-size: 0.6rem; color: #94a3b8; margin:0;">AMSTERDAM WAREHOUSE COMPANY</p>
        <h1>Smart Audit V3</h1>
    </header>

    <div class="zone-card">
        <div class="input-group">
            <label>NAAM INSPECTEUR:</label>
            <input type="text" id="user-name" placeholder="Willem...">
        </div>
    </div>
    
    <div id="checklist-ui"></div>

    <div class="zone-card">
        <label style="color: var(--accent); font-weight: bold; font-size: 0.8rem;">HANDTEKENING:</label>
        <div class="sig-box"><canvas id="sig-canvas"></canvas></div>
        <button onclick="sig.clear()" style="background:#475569; width:100%; padding:5px; font-size:0.7rem; margin-top:5px;">Wissen</button>
    </div>

    <div class="footer-actions">
        <button style="background:#25D366" onclick="sendWA()">WhatsApp</button>
        <button style="background:#0078d4" onclick="window.location.href='mailto:'">E-mail</button>
        <button class="btn-pdf" onclick="generatePDF()">📄 MAAK PDF MET FOTO'S</button>
    </div>
</div>

<div id="pdf-render">
    <h1 style="color: black; border-bottom: 2px solid black;">AWC Audit Rapport</h1>
    <p><strong>Inspecteur:</strong> <span id="p-name"></span> | <strong>Datum:</strong> <span id="p-date"></span></p>
    <table class="pdf-table">
        <thead><tr style="background:#eee;"><th>Zone</th><th>Status</th><th>Opmerking</th><th>Foto</th></tr></thead>
        <tbody id="p-tbody"></tbody>
    </table>
    <div style="margin-top: 30px; text-align: right;">
        <p>Getekend:</p>
        <img id="p-sig" style="width: 140px; border-bottom: 1px solid black;">
    </div>
</div>

<script>
    const zones = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    let sig;

    function init() {
        const list = document.getElementById('checklist-ui');
        zones.forEach(z => {
            list.innerHTML += `
            <div class="zone-card">
                <div class="check-item" id="item-${z}">
                    <div class="check-row">
                        <strong>${z}</strong>
                        <input type="checkbox" checked onchange="toggleZone('${z}', this)">
                    </div>
                    <div class="extra-info">
                        <input type="text" id="note-${z}" placeholder="Wat is de afwijking?">
                        <input type="file" accept="image/*" onchange="handlePhoto(this, '${z}')" style="margin-top:10px; font-size:0.7rem;">
                        <img id="prev-${z}" class="preview-img">
                    </div>
                </div>
            </div>`;
        });
        
        const cvs = document.getElementById('sig-canvas');
        sig = new SignaturePad(cvs);
        const r = Math.max(window.devicePixelRatio || 1, 1);
        cvs.width = cvs.offsetWidth * r; cvs.height = cvs.offsetHeight * r;
        cvs.getContext("2d").scale(r, r);
    }

    function toggleZone(z, el) {
        document.getElementById(`item-${z}`).classList.toggle('has-action', !el.checked);
    }

    function handlePhoto(input, z) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(`prev-${z}`);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    function sendWA() {
        const n = document.getElementById('user-name').value || "Willem";
        let msg = `*AWC AUDIT*%0AInspecteur: ${n}%0A%0A`;
        zones.forEach(z => {
            const ok = document.getElementById(`item-${z}`).classList.contains('has-action') ? "⚠️ ACTIE" : "✅ OK";
            msg += `${z}: ${ok}%0A`;
        });
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }

    async function generatePDF() {
        const n = document.getElementById('user-name').value;
        if(!n || sig.isEmpty()) return alert("Naam en handtekening verplicht!");

        document.getElementById('p-name').innerText = n;
        document.getElementById('p-date').innerText = new Date().toLocaleString();
        document.getElementById('p-sig').src = sig.toDataURL();
        
        const tbody = document.getElementById('p-tbody');
        tbody.innerHTML = "";

        zones.forEach(z => {
            const isFail = document.getElementById(`item-${z}`).classList.contains('has-action');
            const note = document.getElementById(`note-${z}`).value;
            const imgSrc = document.getElementById(`prev-${z}`).src;
            const photo = imgSrc ? `<img src="${imgSrc}" class="pdf-photo">` : '-';

            tbody.innerHTML += `<tr>
                <td><b>${z}</b></td>
                <td style="color:${isFail?'red':'green'}">${isFail?'AFWIJKING':'OK'}</td>
                <td>${isFail ? note : '-'}</td>
                <td>${photo}</td>
            </tr>`;
        });

        const area = document.getElementById('pdf-render');
        area.style.display = 'block';

        const opt = {
            margin: 10,
            filename: `AWC_Rapport_${n}.pdf`,
            image: { type: 'jpeg', quality: 0.7 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().from(area).set(opt).save();
            alert("PDF gedownload!");
        } catch (e) {
            alert("PDF Fout: " + e);
        } finally {
            area.style.display = 'none';
        }
    }

    window.onload = init;
</script>
</body>
</html>
