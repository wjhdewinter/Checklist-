<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC Magazijn Audit PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;
}
body{
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:white;
  margin:0;
  padding:12px;
  padding-bottom:190px;
}
.container{max-width:700px;margin:auto;}
.card{
  background:var(--card);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
  border:1px solid #334155;
}
h1{text-align:center;color:var(--accent);font-size:1.35rem;}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  margin-top:7px;
  box-sizing:border-box;
  font-size:1rem;
}
textarea{min-height:70px;}
.check{
  border-left:6px solid var(--success);
  background:rgba(0,0,0,.25);
  padding:12px;
  border-radius:10px;
}
.check.fail{border-left-color:var(--danger);}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.checkbox{
  width:36px;
  height:36px;
  accent-color:var(--success);
}
.failbox{display:none;margin-top:12px;border-top:1px solid #475569;padding-top:10px;}
.fail .failbox{display:block;}
canvas{
  width:100%;
  height:160px;
  background:white;
  border-radius:8px;
}
.preview{
  max-width:100%;
  display:none;
  margin-top:8px;
  border-radius:8px;
}
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#020617;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  border-top:2px solid var(--accent);
  z-index:1000;
}
button{
  border:none;
  border-radius:10px;
  padding:15px;
  font-weight:bold;
  color:white;
  font-size:1rem;
}
button:disabled{opacity:.55;}
.btn-pdf{grid-column:span 2;background:var(--danger);}
.btn-wa{background:#25D366;color:#052e16;}
.btn-mail{background:#0078d4;}
.btn-clear{background:#475569;width:100%;margin-top:8px;}

/* PDF PREVIEW IS NU NORMAAL ZICHTBAAR NA KLIK */
#pdf-wrap{
  display:none;
  background:#0f172a;
  padding:10px 0 30px;
}
#pdf{
  width:794px;
  max-width:794px;
  min-height:1123px;
  background:white;
  color:black;
  padding:25px;
  font-family:Arial,sans-serif;
  box-sizing:border-box;
  transform-origin:top left;
}
.pdf-table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
.pdf-table th,.pdf-table td{
  border:1px solid #111;
  padding:7px;
  font-size:10px;
  vertical-align:top;
}
.pdf-table th{background:#e5e7eb;}
.pdf-photo{
  max-width:130px;
  max-height:100px;
}
.ok{color:green;font-weight:bold;}
.bad{color:red;font-weight:bold;}
.notice{
  background:#fef3c7;
  color:#78350f;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h1>AWC Magazijn Audit PRO</h1>
  <label>Naam inspecteur</label>
  <input id="name" placeholder="Bijv. Willem">

  <label>Locatie / afdeling</label>
  <input id="location" placeholder="Amsterdam Warehouse Company">
</div>

<div id="list"></div>

<div class="card">
  <b style="color:var(--accent)">Handtekening</b>
  <canvas id="signature"></canvas>
  <button class="btn-clear" onclick="sigPad.clear()">Wis handtekening</button>
</div>

<div class="footer">
  <button class="btn-wa" onclick="sendWA()">WhatsApp</button>
  <button class="btn-mail" onclick="openMail()">E-mail</button>
  <button class="btn-pdf" id="pdfbtn" onclick="makePDF()">📄 PDF MAKEN + MAIL</button>
</div>

<div id="pdf-wrap">
  <div class="notice">
    PDF voorbeeld wordt hieronder zichtbaar gemaakt. Daarna wordt de PDF gedownload/geopend.
  </div>

  <div id="pdf">
    <h2 style="text-align:center;margin:0;">AMSTERDAM WAREHOUSE COMPANY</h2>
    <p style="text-align:center;border-bottom:3px solid #000;padding-bottom:10px;">
      MAGAZIJN AUDIT RAPPORTAGE
    </p>

    <p><b>Inspecteur:</b> <span id="p-name"></span></p>
    <p><b>Locatie:</b> <span id="p-location"></span></p>
    <p><b>Datum:</b> <span id="p-date"></span></p>

    <table class="pdf-table">
      <thead>
        <tr>
          <th>Zone</th>
          <th>Status</th>
          <th>Afwijking / details</th>
          <th>Prio</th>
          <th>Foto</th>
        </tr>
      </thead>
      <tbody id="p-body"></tbody>
    </table>

    <div style="margin-top:30px;text-align:right;">
      <p><b>Handtekening:</b></p>
      <img id="p-sign" style="width:180px;border-bottom:1px solid #000;">
    </div>
  </div>
</div>

</div>

<script>
const zones=[
"Hal A","Hal B","Hal C","Hal D","Hal E","Hal F","Hal G","Hal H",
"Entresol","Expeditie","Toiletten","Kantine","Buitenterrein"
];

const issues=[
"Folie/Hout op vloer",
"Stellingschade",
"Nooduitgang geblokkeerd",
"Verlichting defect",
"Lekkage",
"Rommel / obstakel",
"Onveilige situatie",
"Overig"
];

let sigPad;

function id(z){
  return z.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
}

function init(){
  const list=document.getElementById("list");

  zones.forEach(z=>{
    const zid=id(z);
    list.innerHTML+=`
    <div class="card">
      <div class="check" id="card_${zid}">
        <div class="row">
          <b>${z}</b>
          <input class="checkbox" type="checkbox" checked onchange="toggle('${zid}',this.checked)">
        </div>
        <small>Aan = OK / Uit = actiepunt</small>

        <div class="failbox">
          <label>Afwijking</label>
          <select id="issue_${zid}">
            ${issues.map(i=>`<option>${i}</option>`).join("")}
          </select>

          <label>Details / locatie</label>
          <textarea id="detail_${zid}" placeholder="Omschrijf de afwijking..."></textarea>

          <label>Prioriteit</label>
          <select id="prio_${zid}">
            <option>LAAG</option>
            <option>MEDIUM</option>
            <option>SPOED</option>
          </select>

          <label>Foto</label>
          <input type="file" accept="image/*" id="photo_${zid}" onchange="preview('${zid}')">
          <img class="preview" id="preview_${zid}">
        </div>
      </div>
    </div>`;
  });

  const canvas=document.getElementById("signature");
  sigPad=new SignaturePad(canvas,{backgroundColor:"white"});
  resizeCanvas();
}

function resizeCanvas(){
  const canvas=document.getElementById("signature");
  const ratio=Math.max(window.devicePixelRatio||1,1);
  canvas.width=canvas.offsetWidth*ratio;
  canvas.height=canvas.offsetHeight*ratio;
  canvas.getContext("2d").scale(ratio,ratio);
  if(sigPad) sigPad.clear();
}

function toggle(zid,checked){
  document.getElementById("card_"+zid).classList.toggle("fail",!checked);
}

function preview(zid){
  const input=document.getElementById("photo_"+zid);
  const img=document.getElementById("preview_"+zid);
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{
    img.src=e.target.result;
    img.style.display="block";
  };
  reader.readAsDataURL(input.files[0]);
}

function photoData(file){
  return new Promise(resolve=>{
    if(!file)return resolve("");
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const max=600;
        const scale=Math.min(max/img.width,1);
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.75));
      };
      img.onerror=()=>resolve("");
      img.src=e.target.result;
    };
    reader.onerror=()=>resolve("");
    reader.readAsDataURL(file);
  });
}

function openMail(){
  window.location.href=
  "mailto:willem@amsterdamwarehouse.com?subject=AWC Audit&body=Voeg de PDF bijlage toe.";
}

function sendWA(){
  const name=document.getElementById("name").value||"Onbekend";
  let text=`*AWC AUDIT*%0AInspecteur: ${encodeURIComponent(name)}%0A%0A`;

  zones.forEach(z=>{
    const zid=id(z);
    const fail=document.getElementById("card_"+zid).classList.contains("fail");
    if(fail){
      text+=`⚠️ *${encodeURIComponent(z)}*: ${encodeURIComponent(document.getElementById("issue_"+zid).value)}%0A`;
    }else{
      text+=`✅ ${encodeURIComponent(z)}: OK%0A`;
    }
  });

  window.open("https://api.whatsapp.com/send?text="+text);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  })[m]);
}

async function makePDF(){
  const name=document.getElementById("name").value.trim();
  const location=document.getElementById("location").value.trim();
  const btn=document.getElementById("pdfbtn");

  if(!name){
    alert("Vul eerst de naam van de inspecteur in.");
    return;
  }

  if(sigPad.isEmpty()){
    alert("Handtekening is verplicht.");
    return;
  }

  btn.innerText="⏳ PDF wordt gemaakt...";
  btn.disabled=true;

  try{
    document.getElementById("p-name").innerText=name;
    document.getElementById("p-location").innerText=location||"Amsterdam Warehouse Company";
    document.getElementById("p-date").innerText=new Date().toLocaleString("nl-NL");
    document.getElementById("p-sign").src=sigPad.toDataURL();

    const body=document.getElementById("p-body");
    body.innerHTML="";

    for(const z of zones){
      const zid=id(z);
      const fail=document.getElementById("card_"+zid).classList.contains("fail");
      const file=document.getElementById("photo_"+zid).files[0];
      let photo="-";

      if(fail && file){
        const data=await photoData(file);
        photo=data ? `<img class="pdf-photo" src="${data}">` : "-";
      }

      const issue=fail ? document.getElementById("issue_"+zid).value : "In orde";
      const detail=fail ? document.getElementById("detail_"+zid).value : "";
      const prio=fail ? document.getElementById("prio_"+zid).value : "-";

      body.innerHTML+=`
      <tr>
        <td><b>${escapeHtml(z)}</b></td>
        <td class="${fail?'bad':'ok'}">${fail?'ACTIE':'OK'}</td>
        <td>${escapeHtml(issue)}<br><small>${escapeHtml(detail)}</small></td>
        <td>${escapeHtml(prio)}</td>
        <td>${photo}</td>
      </tr>`;
    }

    const pdfWrap=document.getElementById("pdf-wrap");
    const pdfElement=document.getElementById("pdf");

    pdfWrap.style.display="block";
    pdfWrap.scrollIntoView({behavior:"smooth",block:"start"});

    await new Promise(resolve=>setTimeout(resolve,900));

    const filename=`AWC_Audit_${name.replaceAll(" ","_")}.pdf`;

    const opt={
      margin:8,
      filename:filename,
      image:{type:"jpeg",quality:0.98},
      html2canvas:{
        scale:2,
        useCORS:true,
        backgroundColor:"#ffffff",
        scrollX:0,
        scrollY:0,
        windowWidth:794
      },
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]}
    };

    const blob=await html2pdf()
      .from(pdfElement)
      .set(opt)
      .outputPdf("blob");

    const url=URL.createObjectURL(blob);

    // Openen werkt op mobiel vaak beter dan direct downloaden
    window.open(url, "_blank");

    const a=document.createElement("a");
    a.href=url;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(()=>{
      window.location.href=
      "mailto:willem@amsterdamwarehouse.com?subject="+
      encodeURIComponent("AWC Audit rapport - "+name)+
      "&body="+
      encodeURIComponent("Hallo,\n\nDe PDF is geopend/gedownload op dit toestel. Voeg deze PDF toe als bijlage.\n\nGroet,\n"+name);
    },1200);

    alert("PDF voorbeeld is zichtbaar. De PDF wordt geopend/gedownload. Voeg deze daarna toe als bijlage in de mail.");

  }catch(e){
    alert("Fout bij maken PDF: "+e.message);
  }

  btn.innerText="📄 PDF MAKEN + MAIL";
  btn.disabled=false;
}

window.onload=init;
window.onresize=resizeCanvas;
</script>

</body>
</html>
