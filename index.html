<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AWC Simple PRO Checklist</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --line:#334155;
  --accent:#ff6a00;
  --ok:#22c55e;
  --bad:#ef4444;
  --urgent:#f97316;
  --blue:#2563eb;
  --wa:#25D366;
  --text:#f8fafc;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{
  margin:0;
  padding:12px;
  padding-bottom:230px;
  font-family:Arial,Helvetica,sans-serif;
  background:#0f172a;
  color:var(--text);
}
.app{max-width:720px;margin:auto}
.header{
  background:#111827;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  text-align:center;
  margin-bottom:12px;
}
.logo{
  width:190px;
  max-width:90%;
  background:white;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
}
h1{font-size:1.25rem;margin:0}
.sub{color:var(--muted);font-size:.9rem;margin-top:6px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}
label{display:block;font-weight:bold;margin:10px 0 6px}
select,input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0f172a;
  color:white;
  font-size:1rem;
}
textarea{min-height:78px;resize:vertical}
.grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
.status{
  background:#052e16;
  border:1px solid #166534;
  color:#dcfce7;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  font-weight:bold;
}
.question{
  background:#111827;
  border:1px solid var(--line);
  border-left:6px solid var(--ok);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.question.fail{border-left-color:var(--bad)}
.question.urgent{border-left-color:var(--urgent)}
.question-top{
  display:grid;
  grid-template-columns:1fr 52px;
  gap:10px;
  align-items:center;
}
.q-title{font-weight:bold;line-height:1.25}
.ok-btn{
  height:46px;
  border:none;
  border-radius:10px;
  background:var(--ok);
  color:white;
  font-size:1.4rem;
  font-weight:bold;
}
.fail-fields{
  display:none;
  margin-top:12px;
  border-top:1px solid var(--line);
  padding-top:10px;
}
.question.fail .fail-fields{display:block}
.photo-preview{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-top:8px;
}
.photo-preview img{
  width:100%;
  height:82px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
}
#signature{
  width:100%;
  height:170px;
  background:white;
  border-radius:10px;
  display:block;
  touch-action:none;
}
.small-btn{
  width:100%;
  margin-top:8px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#475569;
  color:white;
  font-weight:bold;
}
.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#020617;
  border-top:2px solid var(--accent);
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:9999;
}
.footer button{
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:15px;
  border:none;
  border-radius:11px;
  color:white;
  font-size:1rem;
  font-weight:bold;
}
.btn-wa{background:var(--wa);color:#052e16!important}
.btn-pdf{background:var(--blue)}
.btn-mail{background:var(--accent)}
button:disabled{opacity:.6}
.hidden{display:none}

/* PDF hidden so mobile does not zoom */
#pdf-wrap{
  display:none;
  position:fixed;
  left:-99999px;
  top:0;
}
#pdf{
  width:794px;
  min-height:1123px;
  background:white;
  color:#111827;
  padding:28px;
  font-family:Arial,Helvetica,sans-serif;
}
.pdf-head{
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom:4px solid #ff6a00;
  padding-bottom:12px;
}
.pdf-head img{width:150px;background:white}
.pdf-head h2{margin:0;font-size:22px}
.pdf-head p{margin:4px 0;color:#64748b;font-size:12px}
.pdf-metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin:16px 0;
}
.pdf-metrics div{
  color:white;
  text-align:center;
  border-radius:10px;
  padding:10px;
}
.pm1{background:#2563eb}.pm2{background:#16a34a}.pm3{background:#f97316}.pm4{background:#dc2626}
.pdf-info{
  background:#f8fafc;
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:10px;
  font-size:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px 12px;
}
.pdf-table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
}
.pdf-table th,.pdf-table td{
  border:1px solid #cbd5e1;
  padding:7px;
  font-size:10px;
  vertical-align:top;
}
.pdf-table th{background:#111827;color:white}
.pdf-photo{width:78px;height:58px;object-fit:cover;border-radius:5px;border:1px solid #cbd5e1}
.pdf-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.sign-row{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:16px;
  align-items:end;
  margin-top:22px;
}
#p-sign{width:230px;height:105px;object-fit:contain;background:white;border-bottom:1px solid #111827}
.footer-note{
  margin-top:18px;
  border-top:2px solid #ff6a00;
  padding-top:8px;
  color:#64748b;
  font-size:10px;
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <img src="logo.png" class="logo" alt="AWC logo">
    <h1 id="appTitle">AWC Simple PRO Checklist</h1>
    <div class="sub" id="appSub">Rustige versie met alle modules</div>
  </div>

  <div class="card">
    <div class="grid">
      <div>
        <label id="langLabel">Taal</label>
        <select id="lang" onchange="setLang(this.value)">
          <option value="nl">🇳🇱 Nederlands</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <div>
        <label id="userLabel">Gebruiker</label>
        <select id="user">
          <option>Willem</option>
          <option>Teamleider</option>
          <option>Medewerker 1</option>
          <option>Medewerker 2</option>
          <option>Expeditie</option>
          <option>BHV</option>
        </select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label id="locationLabel">Locatie</label>
        <select id="location" onchange="updateStatus()">
          <option>Hal A</option><option>Hal B</option><option>Hal C</option><option>Hal D</option>
          <option>Hal E</option><option>Hal F</option><option>Hal G</option><option>Hal H</option>
          <option>Expeditie 1</option><option>Expeditie 2</option><option>Expeditie 3</option>
          <option>Entresol</option><option>Toiletten</option><option>Buitenterrein</option>
        </select>
      </div>
      <div>
        <label id="shiftLabel">Dienst</label>
        <select id="shift">
          <option>Ochtend</option><option>Middag</option><option>Avond</option><option>Nacht</option>
        </select>
      </div>
    </div>

    <label id="moduleLabel">Module</label>
    <select id="module" onchange="renderQuestions()">
      <option value="daily">Dagelijkse checklist</option>
      <option value="reachtruck">Reachtruck / heftruck</option>
      <option value="loading">Laad / los controle</option>
      <option value="cleaning">Schoonmaak</option>
      <option value="inbound">Inkomende goederen</option>
      <option value="outbound">Uitgaande goederen</option>
      <option value="return">Retouren</option>
      <option value="bhv">BHV inspectie</option>
      <option value="technical">Technische dienst</option>
      <option value="leader">Teamleider inspectie</option>
    </select>

    <div id="assetBox" class="hidden">
      <label id="assetLabel">Machine / asset / dock</label>
      <input id="asset" placeholder="Bijv. Reachtruck 03 / Dock 2">
    </div>

    <div id="orderBox" class="hidden">
      <label id="customerLabel">Klant / referentie</label>
      <input id="customer" placeholder="Klantnaam of referentie">
      <label id="orderLabel">Order / retournummer</label>
      <input id="orderNo" placeholder="Ordernummer of retournummer">
    </div>
  </div>

  <div id="status" class="status"></div>

  <div class="card">
    <label id="notesLabel">Algemene opmerkingen</label>
    <textarea id="notes"></textarea>
  </div>

  <div id="questions"></div>

  <div class="card">
    <label id="signatureLabel">Handtekening</label>
    <canvas id="signature"></canvas>
    <button class="small-btn" onclick="clearSig()" id="clearBtn">Wis handtekening</button>
  </div>
</div>

<div id="pdf-wrap">
  <div id="pdf">
    <div class="pdf-head">
      <img src="logo.png" alt="AWC logo">
      <div>
        <h2 id="p-title">AWC Rapport</h2>
        <p id="p-subtitle">Automatisch gegenereerd rapport</p>
      </div>
    </div>

    <div class="pdf-metrics">
      <div class="pm1"><b id="p-score">0%</b><br><span id="p-score-label">Score</span></div>
      <div class="pm2"><b id="p-ok">0</b><br>OK</div>
      <div class="pm3"><b id="p-actions">0</b><br><span id="p-actions-label">Acties</span></div>
      <div class="pm4"><b id="p-urgent">0</b><br><span id="p-urgent-label">SPOED</span></div>
    </div>

    <div class="pdf-info">
      <div><b id="p-loc-label">Locatie:</b> <span id="p-location"></span></div>
      <div><b id="p-user-label">Gebruiker:</b> <span id="p-user"></span></div>
      <div><b id="p-shift-label">Dienst:</b> <span id="p-shift"></span></div>
      <div><b id="p-module-label">Module:</b> <span id="p-module"></span></div>
      <div id="p-extra-a"></div>
      <div id="p-extra-b"></div>
      <div><b id="p-date-label">Datum:</b> <span id="p-date"></span></div>
    </div>

    <table class="pdf-table">
      <thead>
        <tr>
          <th id="th-question">Vraag</th>
          <th id="th-status">Status</th>
          <th id="th-details">Details</th>
          <th id="th-prio">Prio</th>
          <th id="th-photo">Foto</th>
        </tr>
      </thead>
      <tbody id="p-body"></tbody>
    </table>

    <p><b id="p-notes-label">Opmerkingen:</b></p>
    <p id="p-notes"></p>

    <div class="sign-row">
      <div>
        <b id="p-made-by-label">Opgesteld door:</b><br>
        <span id="p-made-by"></span>
      </div>
      <div style="text-align:center">
        <img id="p-sign"><br>
        <span id="p-sign-label">Handtekening</span>
      </div>
    </div>

    <div class="footer-note">Amsterdam Warehouse Co · AWC Warehouse Tools</div>
  </div>
</div>

<div class="footer">
  <button class="btn-wa" onclick="sendWhatsApp()" id="waBtn">💬 WhatsApp</button>
  <button class="btn-pdf" onclick="downloadPDF()" id="pdfBtn">📄 Download PDF</button>
  <button class="btn-mail" onclick="pdfMail()" id="mailBtn">✉️ PDF + E-mail</button>
</div>

<script>
const MAIL_TO = "willem@amsterdamwarehouse.com";
let currentLang = "nl";
let sigPad;

const ui = {
  nl:{
    appTitle:"AWC Simple PRO Checklist",
    appSub:"Rustige versie met alle modules",
    lang:"Taal",
    user:"Gebruiker",
    location:"Locatie",
    shift:"Dienst",
    module:"Module",
    asset:"Machine / asset / dock",

    ok:"OK",

    noActions:"Geen actiepunten gevonden.",
    signatureRequired:"Handtekening verplicht",
    failReason:"Afwijking",
    placeholderDetails:"Details / locatie / actie..."
  },
  en:{
    appTitle:"AWC Simple PRO Checklist",
    appSub:"Clean version with all modules",
    lang:"Language",
    user:"User",
    location:"Location",
    shift:"Shift",
    module:"Module",
    asset:"Machine / asset / dock",
    customer:"Customer / reference",
    order:"Order / return number",
    notes:"General notes",
    signature:"Signature",
    clear:"Clear signature",
    whatsapp:"💬 WhatsApp",
    pdf:"📄 Download PDF",
    mail:"✉️ PDF + Email",
    question:"Question",
    status:"Status",
    details:"Details",
    prio:"Priority",
    photo:"Photo",
    actions:"Actions",
    urgent:"URGENT",
    date:"Date:",
    madeBy:"Prepared by:",
    report:"AWC Inspection Report",
    subtitle:"Automatically generated report",
    ok:"OK",
    action:"ACTION",
    inOrder:"In order",
    noActions:"No action points found.",
    signatureRequired:"Signature required",
    failReason:"Issue",
    placeholderDetails:"Details / location / action..."
  }
};

const moduleInfo = {
  daily:{asset:false,order:false},
  reachtruck:{asset:true,order:false},
  loading:{asset:true,order:false},
  cleaning:{asset:false,order:false},
  inbound:{asset:false,order:true},
  outbound:{asset:false,order:true},
  return:{asset:false,order:true},
  bhv:{asset:false,order:false},
  technical:{asset:true,order:false},
  leader:{asset:false,order:false}
};

const modules = {
  daily:{
    nl:"Dagelijkse checklist", en:"Daily checklist",
    q:{
      nl:["Looppaden vrij","Docks schoon en veilig","Nooduitgangen vrij","Afval verwijderd","Pallets correct gestapeld","Vloer schoon en droog","Verlichting in orde","Geen schade aan stellingen"],
      en:["Walkways clear","Docks clean and safe","Emergency exits clear","Waste removed","Pallets stacked correctly","Floor clean and dry","Lighting OK","No rack damage"]
    }
  },
  reachtruck:{
    nl:"Reachtruck / heftruck", en:"Reach truck / forklift",
    q:{
      nl:["Accu opgeladen","Geen lekkage zichtbaar","Banden / wielen in orde","Remmen werken","Hefmast in orde","Vorken onbeschadigd","Claxon werkt","Verlichting werkt","Veiligheidsgordel aanwezig","Geen zichtbare schade"],
      en:["Battery charged","No visible leakage","Tires / wheels OK","Brakes working","Mast OK","Forks undamaged","Horn works","Lights work","Seatbelt present","No visible damage"]
    }
  },
  loading:{
    nl:"Laad / los controle", en:"Loading / unloading check",
    q:{
      nl:["Trailer stabiel","Dock veilig","Wielblokken geplaatst","Lading gezekerd","Geen zichtbare schade","Papieren compleet","Dockdeur veilig","Werkgebied vrij"],
      en:["Trailer stable","Dock safe","Wheel chocks placed","Load secured","No visible damage","Documents complete","Dock door safe","Work area clear"]
    }
  },
  cleaning:{
    nl:"Schoonmaak", en:"Cleaning",
    q:{
      nl:["Vloer schoon","Afval verwijderd","Werkplek netjes","Geen obstakels","Stof / vuil verwijderd","Afvalbakken geleegd","Toiletten schoon indien van toepassing","Kantine netjes indien van toepassing"],
      en:["Floor clean","Waste removed","Workplace tidy","No obstacles","Dust / dirt removed","Bins emptied","Toilets clean if applicable","Canteen tidy if applicable"]
    }
  },
  inbound:{
    nl:"Inkomende goederen", en:"Inbound goods",
    q:{
      nl:["Aantal klopt","Geen transportschade","Labels correct","Product komt overeen met order","Verpakking intact","Documenten aanwezig","Foto bij afwijking toegevoegd"],
      en:["Quantity correct","No transport damage","Labels correct","Product matches order","Packaging intact","Documents present","Photo added for issue"]
    }
  },
  outbound:{
    nl:"Uitgaande goederen", en:"Outbound goods",
    q:{
      nl:["Juiste order","Correct verpakt","Labels juist","Geen schade","Documenten compleet","Pallet stabiel","Lading gereed voor transport"],
      en:["Correct order","Packed correctly","Labels correct","No damage","Documents complete","Pallet stable","Load ready for transport"]
    }
  },
  return:{
    nl:"Retouren", en:"Returns",
    q:{
      nl:["Retour ontvangen","Verpakking gecontroleerd","Product gecontroleerd","Schade zichtbaar","Aantal gecontroleerd","Label / ordernummer aanwezig","Foto bewijs toegevoegd","Retour klaar voor verwerking"],
      en:["Return received","Packaging checked","Product checked","Visible damage","Quantity checked","Label / order number present","Photo evidence added","Return ready for processing"]
    }
  },
  bhv:{
    nl:"BHV inspectie", en:"Safety inspection",
    q:{
      nl:["Nooduitgangen vrij","Vluchtwegen vrij","Brandblussers bereikbaar","EHBO materiaal aanwezig","Evacuatie verzamelplaats vrij","Noodverlichting zichtbaar","Brandmelders vrij","Aanwezigenregistratie mogelijk"],
      en:["Emergency exits clear","Escape routes clear","Fire extinguishers accessible","First aid available","Assembly point clear","Emergency lighting visible","Fire alarms unobstructed","Attendance registration possible"]
    }
  },
  technical:{
    nl:"Technische dienst", en:"Maintenance",
    q:{
      nl:["Storing omschreven","Locatie duidelijk","Foto toegevoegd","Prioriteit bepaald","Veiligheid beoordeeld","Tijdelijke oplossing nodig","Status open / opvolging nodig"],
      en:["Issue described","Location clear","Photo added","Priority assigned","Safety assessed","Temporary solution needed","Status open / follow-up needed"]
    }
  },
  leader:{
    nl:"Teamleider inspectie", en:"Team leader inspection",
    q:{
      nl:["Werkplek netjes","Team werkt veilig","Productiviteit op orde","Instructies duidelijk","Materialen aanwezig","Knelpunten gemeld","Afwijkingen opgevolgd","Communicatie op orde"],
      en:["Workplace tidy","Team works safely","Productivity on track","Instructions clear","Materials available","Bottlenecks reported","Issues followed up","Communication OK"]
    }
  }
};

const issueOptions = {
  nl:["Rommel / obstakel","Blokkade","Vuil / afval","Schade","Onveilige situatie","Lekkage","Defect","Niet gedaan","Ontbreekt","Verkeerd artikel","Overig"],
  en:["Mess / obstacle","Blocked","Dirt / waste","Damage","Unsafe situation","Leakage","Defective","Not done","Missing","Wrong item","Other"]
};

function t(key){ return ui[currentLang][key]; }

function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;

  document.getElementById("appTitle").innerText = t("appTitle");
  document.getElementById("appSub").innerText = t("appSub");
  document.getElementById("langLabel").innerText = t("lang");
  document.getElementById("userLabel").innerText = t("user");
  document.getElementById("locationLabel").innerText = t("location");
  document.getElementById("shiftLabel").innerText = t("shift");
  document.getElementById("moduleLabel").innerText = t("module");
  document.getElementById("assetLabel").innerText = t("asset");
  document.getElementById("customerLabel").innerText = t("customer");
  document.getElementById("orderLabel").innerText = t("order");
  document.getElementById("notesLabel").innerText = t("notes");
  document.getElementById("signatureLabel").innerText = t("signature");
  document.getElementById("clearBtn").innerText = t("clear");
  document.getElementById("waBtn").innerText = t("whatsapp");
  document.getElementById("pdfBtn").innerText = t("pdf");
  document.getElementById("mailBtn").innerText = t("mail");

  const moduleSelect = document.getElementById("module");
  Array.from(moduleSelect.options).forEach(opt=>{
    opt.text = modules[opt.value][currentLang];
  });

  renderQuestions();
}

function selectedModule(){ return document.getElementById("module").value; }

function renderQuestions(){
  const key = selectedModule();
  const info = moduleInfo[key];
  const questions = modules[key].q[currentLang];
  const box = document.getElementById("questions");

  document.getElementById("assetBox").classList.toggle("hidden", !info.asset);
  document.getElementById("orderBox").classList.toggle("hidden", !info.order);

  box.innerHTML = "";

  questions.forEach((q,i)=>{
    box.insertAdjacentHTML("beforeend",`
      <div class="question" id="q_${i}">
        <div class="question-top">
          <div class="q-title">${q}</div>
          <button class="ok-btn" id="ok_${i}" onclick="toggleFail(${i})">✓</button>
        </div>

        <div class="fail-fields">
          <label>${t("failReason")}</label>
          <select id="issue_${i}">
            ${issueOptions[currentLang].map(x=>`<option>${x}</option>`).join("")}
          </select>

          <label>${t("details")}</label>
          <textarea id="detail_${i}" placeholder="${t("placeholderDetails")}"></textarea>

          <label>${t("prio")}</label>
          <select id="prio_${i}" onchange="updateStatus()">
            <option>LAAG</option>
            <option>MEDIUM</option>
            <option>SPOED</option>
          </select>

          <label>${t("photo")}</label>
          <input type="file" multiple accept="image/*" id="photo_${i}" onchange="preview(${i})">

          <div class="photo-preview" id="prev_${i}"></div>
        </div>
      </div>
    `);
  });

  updateStatus();
}

function toggleFail(i){
  const q = document.getElementById("q_"+i);
  const fail = !q.classList.contains("fail");
  q.classList.toggle("fail", fail);

  const btn = document.getElementById("ok_"+i);
  btn.innerText = fail ? "✕" : "✓";
  btn.style.background = fail ? "var(--bad)" : "var(--ok)";

  updateStatus();
}

function preview(i){
  const box = document.getElementById("prev_"+i);
  box.innerHTML = "";
  const files = document.getElementById("photo_"+i).files;

  Array.from(files).slice(0,6).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => box.insertAdjacentHTML("beforeend",`<img src="${e.target.result}">`);
    reader.readAsDataURL(file);
  });
}

function getReport(){
  const key = selectedModule();
  const questions = modules[key].q[currentLang];
  let ok = 0;
  let actions = [];
  let urgent = [];

  questions.forEach((q,i)=>{
    const fail = document.getElementById("q_"+i).classList.contains("fail");
    if(!fail){ ok++; return; }

    const obj = {
      question:q,
      issue:document.getElementById("issue_"+i).value,
      detail:document.getElementById("detail_"+i).value,
      prio:document.getElementById("prio_"+i).value,
      i
    };

    actions.push(obj);
    if(obj.prio === "SPOED") urgent.push(obj);
  });

  return {
    ok,
    actions,
    urgent,
    total:questions.length,
    score:Math.round(ok / questions.length * 100)
  };
}

function updateStatus(){
  const r = getReport();
  document.getElementById("status").innerHTML =
    `📊 ${t("score")}: <b>${r.score}%</b> · ✅ OK: ${r.ok}/${r.total} · ⚠️ ${t("actions")}: ${r.actions.length} · 🚨 ${t("urgent")}: ${r.urgent.length}`;

  r.actions.forEach(a=>{
    document.getElementById("q_"+a.i).classList.toggle("urgent", a.prio === "SPOED");
  });
}

function buildWhatsAppMessage(){
  const NL = String.fromCharCode(10);
  const r = getReport();
  const key = selectedModule();
  const info = moduleInfo[key];

  let lines = [];

  lines.push(r.urgent.length ? "🚨 *AWC SPOED*" : "📋 *AWC RAPPORT*");
  lines.push("━━━━━━━━━━━━━━");
  lines.push("📍 *" + t("location") + ":* " + document.getElementById("location").value);
  lines.push("📋 *" + t("module") + ":* " + modules[key][currentLang]);
  lines.push("👤 *" + t("user") + ":* " + document.getElementById("user").value);
  lines.push("🕒 *" + t("shift") + ":* " + document.getElementById("shift").value);
  lines.push("📅 *" + t("date").replace(":","") + ":* " + new Date().toLocaleString("nl-NL"));

  if(info.asset){
    lines.push("🏷️ *" + t("asset") + ":* " + (document.getElementById("asset").value || "-"));
  }

  if(info.order){
    lines.push("📦 *" + t("customer") + ":* " + (document.getElementById("customer").value || "-"));
    lines.push("🔢 *" + t("order") + ":* " + (document.getElementById("orderNo").value || "-"));
  }

  lines.push("━━━━━━━━━━━━━━");
  lines.push("");
  lines.push("📊 *Score:* " + r.score + "%");
  lines.push("✅ OK: " + r.ok + "/" + r.total);
  lines.push("⚠️ " + t("actions") + ": " + r.actions.length);
  lines.push("🚨 " + t("urgent") + ": " + r.urgent.length);

  if(r.actions.length){
    lines.push("");
    lines.push("━━━━━━━━━━━━━━");
    lines.push("*" + t("actions").toUpperCase() + "*");
    lines.push("━━━━━━━━━━━━━━");

    r.actions.forEach((a,i)=>{
      lines.push((i+1) + ". " + (a.prio==="SPOED" ? "🚨" : "⚠️") + " *" + a.question + "*");
      lines.push("   • " + t("failReason") + ": " + a.issue);
      if(a.detail) lines.push("   • " + t("details") + ": " + a.detail);
      lines.push("   • " + t("prio") + ": " + a.prio);
      lines.push("");
    });
  }else{
    lines.push("");
    lines.push("✅ " + t("noActions"));
  }

  const note = document.getElementById("notes").value;
  if(note){
    lines.push("");
    lines.push("📝 *" + t("notes") + "*");
    lines.push(note);
  }

  return lines.join(NL);
}

function sendWhatsApp(){
  window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(buildWhatsAppMessage()), "_blank");
}

function fileToData(file){
  return new Promise(resolve=>{
    if(!file) return resolve("");
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function preparePDF(){
  const key = selectedModule();
  const r = getReport();
  const info = moduleInfo[key];

  document.getElementById("pdf-wrap").style.display = "block";

  document.getElementById("p-title").innerText = t("report");
  document.getElementById("p-subtitle").innerText = t("subtitle");
  document.getElementById("p-score").innerText = r.score + "%";
  document.getElementById("p-ok").innerText = r.ok + "/" + r.total;
  document.getElementById("p-actions").innerText = r.actions.length;
  document.getElementById("p-urgent").innerText = r.urgent.length;
  document.getElementById("p-score-label").innerText = "Score";
  document.getElementById("p-actions-label").innerText = t("actions");
  document.getElementById("p-urgent-label").innerText = t("urgent");

  document.getElementById("p-loc-label").innerText = t("location") + ":";
  document.getElementById("p-user-label").innerText = t("user") + ":";
  document.getElementById("p-shift-label").innerText = t("shift") + ":";
  document.getElementById("p-module-label").innerText = t("module") + ":";
  document.getElementById("p-date-label").innerText = t("date");
  document.getElementById("p-notes-label").innerText = t("notes") + ":";
  document.getElementById("p-made-by-label").innerText = t("madeBy");
  document.getElementById("p-sign-label").innerText = t("signature");

  document.getElementById("th-question").innerText = t("question");
  document.getElementById("th-status").innerText = t("status");
  document.getElementById("th-details").innerText = t("details");
  document.getElementById("th-prio").innerText = t("prio");
  document.getElementById("th-photo").innerText = t("photo");

  document.getElementById("p-location").innerText = document.getElementById("location").value;
  document.getElementById("p-user").innerText = document.getElementById("user").value;
  document.getElementById("p-shift").innerText = document.getElementById("shift").value;
  document.getElementById("p-module").innerText = modules[key][currentLang];
  document.getElementById("p-date").innerText = new Date().toLocaleString("nl-NL");
  document.getElementById("p-notes").innerText = document.getElementById("notes").value || "-";
  document.getElementById("p-made-by").innerText = document.getElementById("user").value;
  document.getElementById("p-sign").src = sigPad.toDataURL("image/png");

  document.getElementById("p-extra-a").innerHTML = "";
  document.getElementById("p-extra-b").innerHTML = "";

  if(info.asset){
    document.getElementById("p-extra-a").innerHTML = "<b>" + t("asset") + ":</b> " + (document.getElementById("asset").value || "-");
  }

  if(info.order){
    document.getElementById("p-extra-a").innerHTML = "<b>" + t("customer") + ":</b> " + (document.getElementById("customer").value || "-");
    document.getElementById("p-extra-b").innerHTML = "<b>" + t("order") + ":</b> " + (document.getElementById("orderNo").value || "-");
  }

  const body = document.getElementById("p-body");
  body.innerHTML = "";

  const questions = modules[key].q[currentLang];

  for(let i=0;i<questions.length;i++){
    const fail = document.getElementById("q_"+i).classList.contains("fail");
    const files = document.getElementById("photo_"+i).files;

    let photos = "-";
    if(fail && files.length){
      let arr = [];
      for(const file of Array.from(files).slice(0,4)){
        arr.push(`<img class="pdf-photo" src="${await fileToData(file)}">`);
      }
      photos = `<div class="pdf-photo-grid">${arr.join("")}</div>`;
    }

    body.insertAdjacentHTML("beforeend",`
      <tr>
        <td><b>${questions[i]}</b></td>
        <td>${fail ? t("action") : t("ok")}</td>
        <td>${fail ? document.getElementById("issue_"+i).value + "<br>" + document.getElementById("detail_"+i).value : t("inOrder")}</td>
        <td>${fail ? document.getElementById("prio_"+i).value : "-"}</td>
        <td>${photos}</td>
      </tr>
    `);
  }

  await new Promise(resolve=>setTimeout(resolve,900));
}

async function downloadPDF(){
  if(sigPad.isEmpty()){
    alert(t("signatureRequired"));
    return;
  }

  const btns = document.querySelectorAll("button");
  btns.forEach(b=>b.disabled=true);

  try{
    await preparePDF();

    const opt = {
      margin:8,
      filename:"AWC_Simple_PRO.pdf",
      image:{type:"jpeg",quality:0.98},
      html2canvas:{
        scale:2,
        useCORS:true,
        allowTaint:true,
        backgroundColor:"#ffffff",
        scrollX:0,
        scrollY:0,
        windowWidth:794
      },
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]}
    };

    await html2pdf().set(opt).from(document.getElementById("pdf")).save();

  }catch(err){
    alert("PDF error: " + err.message);
  }finally{
    document.getElementById("pdf-wrap").style.display = "none";
    btns.forEach(b=>b.disabled=false);
  }
}

async function pdfMail(){
  await downloadPDF();
  window.location.href = "mailto:" + MAIL_TO + "?subject=AWC Rapport&body=" + encodeURIComponent(buildWhatsAppMessage().replaceAll("*",""));
}

function resizeSignature(){
  const canvas = document.getElementById("signature");
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  canvas.getContext("2d").scale(ratio, ratio);
  if(sigPad) sigPad.clear();
}

function clearSig(){
  sigPad.clear();
}

window.onload = () => {
  renderQuestions();
  const canvas = document.getElementById("signature");
  sigPad = new SignaturePad(canvas,{backgroundColor:"white"});
  resizeSignature();
  setLang("nl");
};

window.onresize = resizeSignature;
</script>
