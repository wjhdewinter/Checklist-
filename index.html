<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC Audit - Volledig</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 220px; }
        .container { max-width: 600px; margin: auto; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 12px; padding: 15px; border: 1px solid #334155; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; }
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 5px solid #22c55e; }
        .check-item.is-fail { border-left-color: #ef4444; }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 35px; height: 35px; }
        .fail-ui { display: none; margin-top: 10px; }
        .is-fail .fail-ui { display: block; }
        .photo-btn { background: #475569; margin-top: 10px; width: 100%; padding: 10px; border-radius: 8px; color: white; border: none; }
        .sig-container { background: white; border-radius: 8px; margin-top: 10px; }
        canvas { width: 100%; height: 150px; touch-action: none; border-radius: 8px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 2px solid var(--accent); z-index: 1000; }
        button { padding: 18px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        
        /* PDF Styles */
        #pdf-content { background: white; color: black; padding: 20px; display: none; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 8px; text-align: left; color: black; }
    </style>
</head>
<body>

<div class="container">
    <div class="zone-card">
        <h2 style="text-align:center; color:var(--accent);">AWC Audit Professional</h2>
        <input type="text" id="inspector-name" placeholder="Naam Inspecteur...">
    </div>

    <div id="zones-list"></div>

    <div class="zone-card">
        <label style="color:white; font-weight:bold;">HANDTEKENING:</label>
        <div class="sig-container"><canvas id="sig-canvas"></canvas></div>
        <button onclick="sig.clear()" style="background:#475569; width:100%; margin-top:5px; padding:5px;">Wis</button>
    </div>

    <div class="footer">
        <button style="background:#25D366" onclick="sendWA()">WhatsApp</button>
        <button style="background:#0078d4" onclick="window.location.href='mailto:'">E-mail</button>
        <button style="background:#ef4444; grid-column: span 2;" id="pdf-btn" onclick="makePDF()">📄 MAAK PDF RAPPORT</button>
    </div>
</div>

<div id="pdf-content">
    <h1 style="text-align:center;">AWC Inspectierapport</h1>
    <p><strong>Inspecteur:</strong> <span id="r-name"></span></p>
    <p><strong>Datum:</strong> <span id="r-date"></span></p>
    <table class="pdf-table">
        <thead><tr style="background:#ddd;"><th>Zone</th><th>Status</th><th>Details</th></tr></thead>
        <tbody id="r-body"></tbody>
    </table>
    <div style="margin-top:30px;">
        <p>Handtekening:</p>
        <img id="r-sig" style="width:200px; border-bottom:1px solid #000;">
    </div>
</div>

<script>
    const zones = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    const issues = ["Geen afwijking", "Folie/Hout op vloer", "Stellingschade", "Nooduitgang geblokkeerd", "Verlichting defect", "Overig..."];
    let sig;

    function init() {
        const list = document.getElementById('zones-list');
        zones.forEach(z => {
            let opt = issues.map(i => `<option value="${i}">${i}</option>`).join('');
            list.innerHTML += `
            <div class="zone-card">
                <div class="check-item" id="item-${z}">
                    <div class="check-row">
                        <strong>${z}</strong>
                        <input type="checkbox" checked onchange="document.getElementById('item-${z}').classList.toggle('is-fail', !this.checked)">
                    </div>
                    <div class="fail-ui">
                        <select id="sel-${z}">${opt}</select>
                        <input type="text" id="txt-${z}" placeholder="Details...">
                        <input type="file" accept="image/*" class="photo-btn">
                    </div>
                </div>
            </div>`;
        });
        const canvas = document.getElementById('sig-canvas');
        sig = new SignaturePad(canvas);
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    }

    async function makePDF() {
        const name = document.getElementById('inspector-name').value;
        if(!name || sig.isEmpty()) return alert("Naam en handtekening verplicht!");

        document.getElementById('r-name').innerText = name;
        document.getElementById('r-date').innerText = new Date().toLocaleString();
        document.getElementById('r-sig').src = sig.toDataURL();
        
        const tbody = document.getElementById('r-body');
        tbody.innerHTML = "";

        zones.forEach(z => {
            const fail = document.getElementById(`item-${z}`).classList.contains('is-fail');
            tbody.innerHTML += `<tr>
                <td>${z}</td>
                <td style="color:${fail?'red':'green'}">${fail?'AFWIJKING':'OK'}</td>
                <td>${fail ? document.getElementById(`sel-${z}`).value + " " + document.getElementById(`txt-${z}`).value : '-'}</td>
            </tr>`;
        });

        const element = document.getElementById('pdf-content');
        element.style.display = 'block';

        const opt = {
            margin: 10,
            filename: `AWC_Audit_${name}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(element).set(opt).save().then(() => {
            element.style.display = 'none';
        });
    }

    function sendWA() {
        const name = document.getElementById('inspector-name').value || "Inspecteur";
        window.open(`https://api.whatsapp.com/send?text=AWC Audit door ${name} is voltooid.`);
    }

    window.onload = init;
</script>
</body>
</html>
