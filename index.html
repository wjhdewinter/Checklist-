<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC - Volledig Rapport</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 220px; }
        .container { max-width: 550px; margin: auto; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 15px; border: 1px solid #334155; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; box-sizing: border-box; }
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid var(--success); }
        .check-item.is-fail { border-left-color: var(--danger); }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 28px; height: 28px; accent-color: var(--success); }
        .fail-ui { display: none; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        .is-fail .fail-ui { display: block; }
        .preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }
        canvas { width: 100%; height: 150px; background: white; border-radius: 8px; touch-action: none; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 2px solid var(--accent); z-index: 9999; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .btn-pdf { background: var(--danger); grid-column: span 2; font-size: 1.1rem; }

        /* PDF Render Style */
        #pdf-output { display: none; background: white; color: black; padding: 20px; width: 750px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 10pt; }
        .pdf-photo { width: 150px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="zone-card">
        <label>NAAM INSPECTEUR:</label>
        <input type="text" id="inspector" placeholder="Naam invullen...">
    </div>

    <div id="checklist"></div>

    <div class="zone-card">
        <label>HANDTEKENING:</label>
        <canvas id="sig-pad"></canvas>
        <button onclick="sig.clear()" style="background:#475569; width:100%; margin-top:5px;">Wis handtekening</button>
    </div>

    <div class="footer">
        <button class="btn-wa" onclick="verstuurWA()">WhatsApp</button>
        <button style="background:#0078d4;" onclick="window.location.href='mailto:?subject=AWC Rapport'">E-mail</button>
        <button class="btn-pdf" onclick="generatePDF()">📄 MAAK PDF MET FOTO'S</button>
    </div>
</div>

<div id="pdf-output">
    <h1 style="border-bottom: 2px solid black;">AWC Inspectierapport</h1>
    <p><strong>Datum:</strong> <span id="pdf-d"></span> | <strong>Door:</strong> <span id="pdf-n"></span></p>
    <table class="pdf-table">
        <thead><tr style="background:#eee;"><th>Zone</th><th>Status</th><th>Opmerkingen</th><th>Foto</th></tr></thead>
        <tbody id="pdf-b"></tbody>
    </table>
    <div style="margin-top:40px; text-align:right;">
        <p>Handtekening:</p>
        <img id="pdf-s" style="width:150px; border-bottom:1px solid black;">
    </div>
</div>

<script>
    const zones = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    let sig;

    function init() {
        const container = document.getElementById('checklist');
        zones.forEach(z => {
            container.innerHTML += `
            <div class="zone-card">
                <div class="check-item" id="row-${z}">
                    <div class="check-row">
                        <strong>${z}</strong>
                        <input type="checkbox" checked onchange="document.getElementById('row-${z}').classList.toggle('is-fail', !this.checked)">
                    </div>
                    <div class="fail-ui">
                        <input type="text" id="note-${z}" placeholder="Wat is er mis en waar?">
                        <input type="file" accept="image/*" onchange="preview(this, '${z}')" style="margin-top:10px;">
                        <img id="prev-${z}" class="preview-img">
                    </div>
                </div>
            </div>`;
        });
        
        const canvas = document.getElementById('sig-pad');
        sig = new SignaturePad(canvas);
        const r = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * r; canvas.height = canvas.offsetHeight * r;
        canvas.getContext("2d").scale(r, r);
    }

    function preview(input, z) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(`prev-${z}`);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    function verstuurWA() {
        const n = document.getElementById('inspector').value || "Willem";
        let msg = `*AWC WAREHOUSE STATUS*%0AInspecteur: ${n}%0A%0A`;
        zones.forEach(z => {
            const ok = !document.getElementById(`row-${z}`).classList.contains('is-fail');
            msg += ok ? `✅ ${z}: OK%0A` : `⚠️ ${z}: ACTIE NODIG!%0A`;
        });
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }

    async function generatePDF() {
        const n = document.getElementById('inspector').value;
        if(!n || sig.isEmpty()) return alert("Naam en handtekening verplicht!");

        document.getElementById('pdf-n').innerText = n;
        document.getElementById('pdf-d').innerText = new Date().toLocaleString();
        document.getElementById('pdf-s').src = sig.toDataURL();
        
        const tbody = document.getElementById('pdf-b');
        tbody.innerHTML = "";

        for (const z of zones) {
            const ok = !document.getElementById(`row-${z}`).classList.contains('is-fail');
            const note = document.getElementById(`note-${z}`).value;
            const imgSrc = document.getElementById(`prev-${z}`).src;
            const photoHtml = imgSrc ? `<img src="${imgSrc}" class="pdf-photo">` : '-';
            
            tbody.innerHTML += `<tr>
                <td><b>${z}</b></td>
                <td style="color:${ok?'green':'red'}">${ok?'OK':'ACTIE'}</td>
                <td>${note || '-'}</td>
                <td>${photoHtml}</td>
            </tr>`;
        }

        const el = document.getElementById('pdf-output');
        el.style.display = 'block';
        
        const opt = {
            margin: 10,
            filename: `AWC_Rapport_${n}.pdf`,
            image: { type: 'jpeg', quality: 0.7 }, // Kwaliteit iets lager voor stabiliteit
            html2canvas: { scale: 1.5, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().from(el).set(opt).save();
            alert("✅ PDF succesvol gemaakt!");
        } catch(e) {
            alert("Fout: " + e);
        } finally {
            el.style.display = 'none';
        }
    }

    window.onload = init;
</script>
</body>
</html>
