<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AWC Warehouse Tools NEXT LEVEL UI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
:root{
  --bg:#020617;
  --panel:#0f172a;
  --card:#111827;
  --card2:#1e293b;
  --line:#334155;
  --accent:#ff6a00;
  --ok:#22c55e;
  --bad:#ef4444;
  --action:#f59e0b;
  --urgent:#7c3aed;
  --blue:#2563eb;
  --wa:#25D366;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{
  margin:0;
  padding:12px;
  padding-bottom:245px;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
  background:
    radial-gradient(circle at top left,rgba(255,106,0,.18),transparent 30%),
    radial-gradient(circle at top right,rgba(37,99,235,.18),transparent 35%),
    linear-gradient(180deg,#020617,#08111f 45%,#020617);
}
.app{width:100%;max-width:760px;margin:auto}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 4px 16px;
}
.menu{font-size:2rem;line-height:1}
.topbar h1{font-size:1.35rem;margin:0;text-align:center}
.shield{
  width:44px;height:44px;border:2px solid var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-weight:900;color:white;
}
.card{
  background:linear-gradient(145deg,rgba(30,41,59,.9),rgba(15,23,42,.95));
  border:1px solid rgba(148,163,184,.22);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 12px 26px rgba(0,0,0,.25);
}
.info-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:560px){.info-grid{grid-template-columns:1fr 1fr 1fr}}
.info-box{
  background:rgba(2,6,23,.35);
  border:1px solid rgba(148,163,184,.18);
  border-radius:14px;
  padding:12px;
}
.info-label{color:var(--muted);font-size:.82rem;margin-bottom:4px}
select,input,textarea{
  width:100%;
  min-width:0;
  padding:11px;
  border:1px solid rgba(148,163,184,.28);
  border-radius:12px;
  color:white;
  background:#0f172a;
  font-size:1rem;
}
textarea{min-height:86px;resize:vertical}
label{display:block;font-weight:700;margin:10px 0 6px}
.summary-title{font-size:1.12rem;font-weight:800;margin-bottom:12px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:560px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{
  border-radius:13px;
  padding:13px;
  text-align:center;
  border:1px solid rgba(255,255,255,.16);
}
.stat b{display:block;font-size:1.65rem;margin-top:6px}
.stat-ok{background:linear-gradient(135deg,#14532d,#15803d)}
.stat-bad{background:linear-gradient(135deg,#7f1d1d,#b91c1c)}
.stat-action{background:linear-gradient(135deg,#78350f,#b45309)}
.stat-urgent{background:linear-gradient(135deg,#4c1d95,#7c3aed)}
.progress-label{display:flex;justify-content:space-between;margin:12px 0 6px}
.progress{height:10px;background:#1e293b;border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-head h2{font-size:1.1rem;margin:0}
.pill{background:#14532d;color:#dcfce7;border-radius:10px;padding:7px 12px;font-weight:800}
.checklist{display:flex;flex-direction:column;gap:8px}
.check-row{
  display:grid;
  grid-template-columns:1fr 56px 48px;
  gap:8px;
  align-items:center;
  background:rgba(15,23,42,.75);
  border:1px solid rgba(148,163,184,.22);
  border-radius:12px;
  padding:8px;
}
.check-row.fail{border-color:rgba(239,68,68,.75);background:rgba(127,29,29,.18)}
.check-row.urgent{border-color:rgba(124,58,237,.9);background:rgba(76,29,149,.22)}
.check-title{font-size:.98rem;line-height:1.25}
.ok-btn{
  height:46px;border:none;border-radius:10px;background:linear-gradient(135deg,#22c55e,#15803d);
  color:white;font-size:1.45rem;font-weight:900;
}
.photo-btn{
  height:46px;border:1px solid rgba(148,163,184,.28);border-radius:10px;background:#0f172a;color:white;font-size:1.25rem;
}
.fail-panel{
  grid-column:1/-1;
  display:none;
  border-top:1px solid rgba(148,163,184,.20);
  padding-top:10px;
}
.check-row.fail .fail-panel{display:block}
.photo-input{display:none}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.preview-grid img{width:100%;height:86px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.more-btn{
  width:100%;
  border:none;
  background:transparent;
  color:#60a5fa;
  padding:10px;
  font-weight:800;
  font-size:1rem;
}
#signature{
  width:100%;
  height:165px;
  background:white;
  border-radius:14px;
  display:block;
  touch-action:none;
}
.signature-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.small-btn{
  border:1px solid rgba(148,163,184,.28);
  background:#0f172a;
  color:white;
  border-radius:12px;
  padding:12px;
  font-weight:800;
}
.blue-small{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none}
.footer{
  position:fixed;
  left:0;right:0;bottom:0;
  background:rgba(2,6,23,.98);
  backdrop-filter:blur(12px);
  border-top:2px solid var(--accent);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:9999;
}
.action-btn{
  width:100%;
  max-width:760px;
  margin:0 auto;
  border:none;
  border-radius:12px;
  padding:16px;
  color:white;
  font-size:1.08rem;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 10px 22px rgba(0,0,0,.30);
}
.btn-wa{background:linear-gradient(135deg,#25D366,#16a34a)}
.btn-pdf{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.btn-mail{background:linear-gradient(135deg,#f97316,#dc2626)}
button:disabled{opacity:.55}
.hidden{display:none!important}

/* PDF is hidden from layout to prevent mobile zoom */
#pdf-wrap{
  display:none;
  position:fixed;
  left:-99999px;
  top:0;
}
#pdf{
  display:block!important;
  background:#fff;
  color:#0f172a;
  width:794px;
  max-width:794px;
  min-height:1123px;
  padding:24px;
  font-family:Arial,Helvetica,sans-serif;
}
.pdf-head{display:flex;align-items:center;gap:16px;border-bottom:5px solid #ff6a00;padding-bottom:13px}
.pdf-head img{width:160px;background:white}
.pdf-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.pdf-metrics div{padding:11px;border-radius:11px;color:white;text-align:center}
.pm1{background:#2563eb}.pm2{background:#16a34a}.pm3{background:#f97316}.pm4{background:#7c3aed}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #cbd5e1;padding:7px;font-size:10px;vertical-align:top}
th{background:#0f172a;color:white}
.pdf-photo{width:80px;height:60px;object-fit:cover;border-radius:5px}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
#p-sign{width:230px;height:105px;object-fit:contain;border-bottom:1px solid #000;background:white}
</style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <div class="menu">☰</div>
    <h1>AWC Warehouse Tools</h1>
    <div class="shield">AWC</div>
  </div>

  <div class="card">
    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">📍 Locatie</div>
        <select id="location" onchange="updateScore()">
          <option>Hal A</option><option>Hal B</option><option>Hal C</option><option>Hal D</option>
          <option>Hal E</option><option>Hal F</option><option>Hal G</option><option>Hal H</option>
          <option>Expeditie 1</option><option>Expeditie 2</option><option>Expeditie 3</option>
          <option>Entresol</option><option>Toiletten</option><option>Buitenterrein</option>
        </select>
      </div>
      <div class="info-box">
        <div class="info-label">👤 Gebruiker</div>
        <select id="user">
          <option>Willem</option><option>Teamleider</option><option>Medewerker 1</option><option>Medewerker 2</option><option>Expeditie</option><option>BHV</option>
        </select>
      </div>
      <div class="info-box">
        <div class="info-label">🕒 Dienst</div>
        <select id="shift"><option>Ochtend</option><option>Middag</option><option>Avond</option><option>Nacht</option></select>
      </div>
    </div>
    <label>Module</label>
    <select id="module" onchange="renderList()">
      <option value="daily">Dagelijkse checklist</option>
      <option value="reachtruck">Reachtruck / heftruck</option>
      <option value="loading">Laad / los controle</option>
      <option value="cleaning">Schoonmaak</option>
      <option value="inbound">Inkomende goederen</option>
      <option value="outbound">Uitgaande goederen</option>
      <option value="return">Retouren</option>
      <option value="bhv">BHV inspectie</option>
      <option value="technical">Technische dienst</option>
      <option value="leader">Teamleider inspectie</option>
    </select>
  </div>

  <div class="card">
    <div class="summary-title">Overzicht</div>
    <div class="stats">
      <div class="stat stat-ok">✓ OK<b id="s-ok">0</b></div>
      <div class="stat stat-bad">✕ Niet OK<b id="s-bad">0</b></div>
      <div class="stat stat-action">⚠ Actie<b id="s-action">0</b></div>
      <div class="stat stat-urgent">🚨 SPOED<b id="s-urgent">0</b></div>
    </div>
    <div class="progress-label"><span>Totaal controles</span><b id="s-total">0 / 0</b></div>
    <div class="progress"><span id="s-progress"></span></div>
  </div>

  <div class="card">
    <label>Algemene opmerkingen</label>
    <textarea id="notes" placeholder="Extra opmerkingen..."></textarea>
  </div>

  <div class="card">
    <div class="section-head"><h2 id="section-title">Checklist</h2><span class="pill" id="section-pill">0 / 0 OK</span></div>
    <div class="checklist" id="list"></div>
    <button class="more-btn" onclick="toggleAll()">Bekijk alle controles⌄</button>
  </div>

  <div class="card">
    <label>Handtekening</label>
    <canvas id="signature"></canvas>
    <div class="signature-actions">
      <button class="small-btn" onclick="undoSig()">↩ Wissen</button>
      <button class="small-btn blue-small" onclick="clearSig()">🗑 Leegmaken</button>
    </div>
  </div>
</div>

<div id="pdf-wrap">
  <div id="pdf">
    <div class="pdf-head">
      <img src="logo.png" alt="AWC logo">
      <div><h2 id="p-title">AWC Rapport</h2><p id="p-date"></p></div>
    </div>
    <div class="pdf-metrics">
      <div class="pm1"><b id="p-score">0%</b><br>Score</div>
      <div class="pm2"><b id="p-ok">0</b><br>OK</div>
      <div class="pm3"><b id="p-actions">0</b><br>Acties</div>
      <div class="pm4"><b id="p-urgent">0</b><br>SPOED</div>
    </div>
    <p><b>Locatie:</b> <span id="p-location"></span> | <b>Gebruiker:</b> <span id="p-user"></span> | <b>Dienst:</b> <span id="p-shift"></span></p>
    <table><thead><tr><th>Punt</th><th>Status</th><th>Details</th><th>Prio</th><th>Foto</th></tr></thead><tbody id="p-body"></tbody></table>
    <p><b>Opmerkingen:</b></p><p id="p-notes"></p>
    <p style="text-align:right"><b>Handtekening:</b><br><img id="p-sign"></p>
  </div>
</div>

<div class="footer">
  <button class="action-btn btn-wa" onclick="sendWhatsApp()">💬 WhatsApp versturen</button>
  <button class="action-btn btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
  <button class="action-btn btn-mail" onclick="pdfMail()">✉️ PDF + E-mail verzenden</button>
</div>

<script>
const MAIL_TO="willem@amsterdamwarehouse.com";
const moduleData={
  daily:["Looppaden vrij","Docks schoon en veilig","Nooduitgangen vrij","Afval verwijderd","Pallets correct gestapeld","Vloer schoon en droog","Verlichting in orde","Geen schade aan stellingen"],
  reachtruck:["Accu opgeladen","Geen lekkage zichtbaar","Banden / wielen in orde","Remmen werken","Hefmast in orde","Vorken onbeschadigd","Claxon werkt","Verlichting werkt","Veiligheidsgordel aanwezig","Geen zichtbare schade"],
  loading:["Trailer stabiel","Dock veilig","Wielblokken geplaatst","Lading gezekerd","Geen zichtbare schade","Papieren compleet","Dockdeur veilig","Werkgebied vrij"],
  cleaning:["Vloer schoon","Afval verwijderd","Werkplek netjes","Geen obstakels","Stof / vuil verwijderd","Afvalbakken geleegd","Toiletten schoon indien van toepassing"],
  inbound:["Aantal klopt","Geen transportschade","Labels correct","Product komt overeen met order","Verpakking intact","Documenten aanwezig","Foto bij afwijking toegevoegd"],
  outbound:["Juiste order","Correct verpakt","Labels juist","Geen schade","Documenten compleet","Pallet stabiel","Lading gereed"],
  return:["Retour ontvangen","Verpakking gecontroleerd","Product gecontroleerd","Schade zichtbaar","Aantal gecontroleerd","Label / ordernummer aanwezig","Foto bewijs toegevoegd"],
  bhv:["Nooduitgangen vrij","Vluchtwegen vrij","Brandblussers bereikbaar","EHBO materiaal aanwezig","Verzamelplaats vrij","Noodverlichting zichtbaar","Brandmelders vrij"],
  technical:["Storing omschreven","Locatie duidelijk","Foto toegevoegd","Prioriteit bepaald","Veiligheid beoordeeld","Opvolging nodig"],
  leader:["Werkplek netjes","Team werkt veilig","Productiviteit op orde","Instructies duidelijk","Materialen aanwezig","Knelpunten gemeld","Communicatie op orde"]
};
const issues=["Rommel / obstakel","Blokkade","Vuil / afval","Schade","Onveilige situatie","Lekkage","Defect","Overig"];
let sigPad, showAll=false;

function renderList(){
  const key=document.getElementById("module").value;
  const list=document.getElementById("list");
  document.getElementById("section-title").innerText=document.getElementById("module").selectedOptions[0].text;
  list.innerHTML="";
  moduleData[key].forEach((item,i)=>{
    const extraClass = (!showAll && i>3) ? "hidden extra-row" : "extra-row";
    list.insertAdjacentHTML("beforeend",`
      <div class="check-row ${extraClass}" id="card_${i}">
        <div class="check-title">${item}</div>
        <button class="ok-btn" onclick="toggleFail(${i})" id="ok_${i}">✓</button>
        <button class="photo-btn" onclick="document.getElementById('photo_${i}').click()">📷</button>
        <input class="photo-input" type="file" multiple accept="image/*" id="photo_${i}" onchange="preview(${i})">
        <div class="fail-panel">
          <label>Afwijking</label>
          <select id="issue_${i}">${issues.map(x=>`<option>${x}</option>`).join("")}</select>
          <label>Details</label>
          <textarea id="detail_${i}" placeholder="Details / locatie / actie..."></textarea>
          <label>Prioriteit</label>
          <select id="prio_${i}" onchange="updateScore()"><option>LAAG</option><option>MEDIUM</option><option>SPOED</option></select>
          <div class="preview-grid" id="prev_${i}"></div>
        </div>
      </div>
    `);
  });
  updateScore();
}
function toggleAll(){showAll=!showAll;renderList();}
function toggleFail(i){
  const card=document.getElementById("card_"+i);
  const fail=!card.classList.contains("fail");
  card.classList.toggle("fail",fail);
  document.getElementById("ok_"+i).innerText=fail?"✕":"✓";
  document.getElementById("ok_"+i).style.background=fail?"linear-gradient(135deg,#ef4444,#991b1b)":"linear-gradient(135deg,#22c55e,#15803d)";
  updateScore();
}
function preview(i){
  const box=document.getElementById("prev_"+i);box.innerHTML="";
  Array.from(document.getElementById("photo_"+i).files).slice(0,6).forEach(file=>{
    const r=new FileReader();r.onload=e=>box.insertAdjacentHTML("beforeend",`<img src="${e.target.result}">`);r.readAsDataURL(file);
  });
}
function getReport(){
  const key=document.getElementById("module").value;
  let ok=0,actions=[],urgent=[];
  moduleData[key].forEach((item,i)=>{
    const fail=document.getElementById("card_"+i).classList.contains("fail");
    if(!fail){ok++;return;}
    const obj={item,issue:document.getElementById("issue_"+i).value,detail:document.getElementById("detail_"+i).value,prio:document.getElementById("prio_"+i).value,i};
    actions.push(obj); if(obj.prio==="SPOED")urgent.push(obj);
  });
  return {ok,actions,urgent,total:moduleData[key].length,score:Math.round(ok/moduleData[key].length*100)};
}
function updateScore(){
  const r=getReport();
  document.getElementById("s-ok").innerText=r.ok;
  document.getElementById("s-bad").innerText=r.actions.length;
  document.getElementById("s-action").innerText=r.actions.filter(a=>a.prio!=="SPOED").length;
  document.getElementById("s-urgent").innerText=r.urgent.length;
  document.getElementById("s-total").innerText=r.ok+" / "+r.total;
  document.getElementById("s-progress").style.width=r.score+"%";
  document.getElementById("section-pill").innerText=r.ok+" / "+r.total+" OK";
  r.actions.forEach(a=>document.getElementById("card_"+a.i).classList.toggle("urgent",a.prio==="SPOED"));
}
function buildWhatsAppMessage(){
  const NL=String.fromCharCode(10), r=getReport(), lines=[];
  lines.push(r.urgent.length?"🚨 *AWC SPOED MELDING*":"📋 *AWC WAREHOUSE RAPPORT*");
  lines.push("━━━━━━━━━━━━━━");
  lines.push("🏢 *Locatie:* "+document.getElementById("location").value);
  lines.push("🧰 *Module:* "+document.getElementById("module").selectedOptions[0].text);
  lines.push("👤 *Gebruiker:* "+document.getElementById("user").value);
  lines.push("🕒 *Dienst:* "+document.getElementById("shift").value);
  lines.push("📅 *Datum:* "+new Date().toLocaleString("nl-NL"));
  lines.push("━━━━━━━━━━━━━━");
  lines.push("");
  lines.push("📊 *SCORE:* "+r.score+"%");
  lines.push("✅ OK: "+r.ok+"/"+r.total);
  lines.push("⚠️ Acties: "+r.actions.length);
  lines.push("🚨 SPOED: "+r.urgent.length);
  if(r.actions.length){
    lines.push(""); lines.push("━━━━━━━━━━━━━━"); lines.push("*ACTIEPUNTEN*"); lines.push("━━━━━━━━━━━━━━");
    r.actions.forEach((a,i)=>{
      lines.push((i+1)+". "+(a.prio==="SPOED"?"🚨":"⚠️")+" *"+a.item+"*");
      lines.push("   • Reden: "+a.issue);
      if(a.detail)lines.push("   • Details: "+a.detail);
      lines.push("   • Prio: "+a.prio); lines.push("");
    });
  }else{lines.push("");lines.push("✅ *Geen actiepunten gevonden.*");}
  const note=document.getElementById("notes").value;
  if(note){lines.push("");lines.push("📝 *OPMERKING*");lines.push(note);}
  lines.push("");lines.push("━━━━━━━━━━━━━━");lines.push("📎 PDF is apart gegenereerd vanuit de AWC app.");
  return lines.join(NL);
}
function sendWhatsApp(){window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(buildWhatsAppMessage()),"_blank");}
function fileToData(file){return new Promise(resolve=>{if(!file)return resolve("");const r=new FileReader();r.onload=e=>resolve(e.target.result);r.readAsDataURL(file);});}
async function preparePDF(){
  const r=getReport(), key=document.getElementById("module").value;
  document.getElementById("pdf-wrap").style.display="block";
  document.getElementById("p-title").innerText="AWC "+document.getElementById("module").selectedOptions[0].text;
  document.getElementById("p-date").innerText=new Date().toLocaleString("nl-NL");
  document.getElementById("p-score").innerText=r.score+"%";document.getElementById("p-ok").innerText=r.ok+"/"+r.total;document.getElementById("p-actions").innerText=r.actions.length;document.getElementById("p-urgent").innerText=r.urgent.length;
  document.getElementById("p-location").innerText=document.getElementById("location").value;document.getElementById("p-user").innerText=document.getElementById("user").value;document.getElementById("p-shift").innerText=document.getElementById("shift").value;document.getElementById("p-notes").innerText=document.getElementById("notes").value||"-";document.getElementById("p-sign").src=sigPad.toDataURL("image/png");
  const body=document.getElementById("p-body");body.innerHTML="";
  for(let i=0;i<moduleData[key].length;i++){
    const fail=document.getElementById("card_"+i).classList.contains("fail"), files=document.getElementById("photo_"+i).files;
    let photos="-";
    if(fail&&files.length){let arr=[];for(const file of Array.from(files).slice(0,4)){arr.push(`<img class="pdf-photo" src="${await fileToData(file)}">`);}photos=`<div class="pdf-grid">${arr.join("")}</div>`;}
    body.insertAdjacentHTML("beforeend",`<tr><td><b>${moduleData[key][i]}</b></td><td>${fail?"ACTIE":"OK"}</td><td>${fail?document.getElementById("issue_"+i).value+"<br>"+document.getElementById("detail_"+i).value:"In orde"}</td><td>${fail?document.getElementById("prio_"+i).value:"-"}</td><td>${photos}</td></tr>`);
  }
  await new Promise(resolve=>setTimeout(resolve,900));
}
async function downloadPDF(){
  if(sigPad.isEmpty())return alert("Handtekening verplicht");
  const btns=document.querySelectorAll("button");btns.forEach(b=>b.disabled=true);
  try{
    await preparePDF();
    const opt={margin:8,filename:"AWC_rapport.pdf",image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:"#ffffff",scrollX:0,scrollY:0,windowWidth:794},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},pagebreak:{mode:["css","legacy"]}};
    await html2pdf().set(opt).from(document.getElementById("pdf")).save();
  }catch(err){alert("Fout bij PDF maken: "+err.message);}
  finally{document.getElementById("pdf-wrap").style.display="none";btns.forEach(b=>b.disabled=false);}
}
async function pdfMail(){await downloadPDF();window.location.href="mailto:"+MAIL_TO+"?subject=AWC Rapport&body="+encodeURIComponent(buildWhatsAppMessage().replaceAll("*",""));}
function clearSig(){sigPad.clear();}
function undoSig(){const data=sigPad.toData();if(data.length){data.pop();sigPad.fromData(data);}}
function resizeSignature(){const canvas=document.getElementById("signature");const ratio=Math.max(window.devicePixelRatio||1,1);canvas.width=canvas.offsetWidth*ratio;canvas.height=canvas.offsetHeight*ratio;canvas.getContext("2d").scale(ratio,ratio);if(sigPad)sigPad.clear();}
window.onload=()=>{renderList();const canvas=document.getElementById("signature");sigPad=new SignaturePad(canvas,{backgroundColor:"white"});resizeSignature();};
window.onresize=resizeSignature;
</script>
