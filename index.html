<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWC Enterprise Audit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 220px; }
        .container { max-width: 600px; margin: auto; }
        
        .header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .zone-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 15px; border: 1px solid #334155; }
        
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .check-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 5px solid var(--success); }
        .check-item.is-fail { border-left-color: var(--danger); }
        .check-row { display: flex; align-items: center; justify-content: space-between; }
        input[type="checkbox"] { width: 35px; height: 35px; accent-color: var(--success); }
        
        .fail-ui { display: none; margin-top: 15px; padding-top: 10px; border-top: 1px solid #444; }
        .is-fail .fail-ui { display: block; }
        
        .sig-container { background: white; border-radius: 8px; margin-top: 10px; }
        canvas { width: 100%; height: 160px; touch-action: none; border-radius: 8px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 2px solid var(--accent); z-index: 9999; }
        button { padding: 18px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 1rem; }
        .btn-pdf { background: var(--danger); grid-column: span 2; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }

        /* PDF Render (verborgen) */
        #pdf-export { display: none; background: white; color: black; padding: 20px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 10pt; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; margin: 0;">AMSTERDAM WAREHOUSE COMPANY</p>
        <h1 style="margin: 5px 0;">Warehouse Audit</h1>
    </div>

    <div class="zone-card">
        <label>NAAM INSPECTEUR:</label>
        <input type="text" id="name-in" placeholder="Willem...">
    </div>

    <div id="checklist-area"></div>

    <div class="zone-card">
        <label style="color: var(--accent); font-weight: bold;">HANDTEKENING:</label>
        <div class="sig-container"><canvas id="sig-pad"></canvas></div>
        <button onclick="signature.clear()" style="background:#475569; width:100%; padding:5px; margin-top:5px;">Wissen</button>
    </div>

    <div class="footer">
        <button style="background:#25D366" onclick="goWA()">WhatsApp</button>
        <button style="background:#0078d4" onclick="window.location.href='mailto:?subject=AWC Audit'">E-mail</button>
        <button class="btn-pdf" onclick="goPDF()">📄 DOWNLOAD PDF RAPPORT</button>
    </div>
</div>

<div id="pdf-export">
    <h1 style="border-bottom: 2px solid #000;">AWC Inspectierapport</h1>
    <p><strong>Datum:</strong> <span id="p-datum"></span> | <strong>Inspecteur:</strong> <span id="p-naam"></span></p>
    <table class="pdf-table">
        <thead><tr style="background:#eee;"><th>Zone</th><th>Status</th><th>Bevinding</th><th>Prio</th></tr></thead>
        <tbody id="p-body"></tbody>
    </table>
    <div style="margin-top: 40px; text-align: right;">
        <p>Getekend:</p>
        <img id="p-hand" style="width: 150px; border-bottom: 1px solid #000;">
    </div>
</div>

<script>
    const hallen = ["Hal A", "Hal B", "Hal C", "Hal D", "Hal E", "Hal F", "Hal G", "Hal H", "Entresol", "Expeditie", "Toiletten"];
    const opties = ["Folie/Hout op vloer", "Stellingschade", "Nooduitgang geblokkeerd", "Verlichting defect", "Lekkage", "Overig..."];
    
    let signature;

    function build() {
        const target = document.getElementById('checklist-area');
        hallen.forEach(h => {
            let menu = opties.map(o => `<option value="${o}">${o}</option>`).join('');
            target.innerHTML += `
            <div class="zone-card">
                <div class="check-item" id="item-${h}">
                    <div class="check-row">
                        <strong>${h}</strong>
                        <input type="checkbox" checked onchange="document.getElementById('item-${h}').classList.toggle('is-fail', !this.checked)">
                    </div>
                    <div class="fail-ui">
                        <label style="font-size:0.7rem; color:var(--accent)">WAT IS HET PROBLEEM?</label>
                        <select id="sel-${h}">${menu}</select>
                        <input type="text" id="txt-${h}" placeholder="Locatie of extra info...">
                        <select id="prio-${h}">
                            <option value="LAAG">Prioriteit: LAAG</option>
                            <option value="MEDIUM">Prioriteit: MEDIUM</option>
                            <option value="SPOED">⚠️ SPOED</option>
                        </select>
                        <input type="file" accept="image/*" style="margin-top:10px; font-size:0.7rem;">
                    </div>
                </div>
            </div>`;
        });

        const canvas = document.getElementById('sig-pad');
        signature = new SignaturePad(canvas);
        const r = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * r; canvas.height = canvas.offsetHeight * r;
        canvas.getContext("2d").scale(r, r);
    }

    function goWA() {
        const n = document.getElementById('name-in').value || "Willem";
        let msg = `*AWC AUDIT*%0AInspecteur: ${n}%0A%0A`;
        hallen.forEach(h => {
            const ok = !document.getElementById(`item-${h}`).classList.contains('is-fail');
            msg += ok ? `✅ ${h}: OK%0A` : `⚠️ ${h}: ${document.getElementById(`sel-${h}`).value}%0A`;
        });
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }

    async function goPDF() {
        const n = document.getElementById('name-in').value;
        if(!n || signature.isEmpty()) return alert("Vul je naam in en zet een handtekening!");

        document.getElementById('p-naam').innerText = n;
        document.getElementById('p-datum').innerText = new Date().toLocaleString();
        document.getElementById('p-hand').src = signature.toDataURL();
        
        const body = document.getElementById('p-body');
        body.innerHTML = "";

        hallen.forEach(h => {
            const fail = document.getElementById(`item-${h}`).classList.contains('is-fail');
            body.innerHTML += `<tr>
                <td><b>${h}</b></td>
                <td style="color:${fail?'red':'green'}">${fail?'ACTIE':'OK'}</td>
                <td>${fail ? document.getElementById(`sel-${h}`).value + " (" + document.getElementById(`txt-${h}`).value + ")" : '-'}</td>
                <td>${fail ? document.getElementById(`prio-${h}`).value : '-'}</td>
            </tr>`;
        });

        const el = document.getElementById('pdf-export');
        el.style.display = 'block';
        
        const opt = {
            margin: 10,
            filename: `AWC_Rapport_${n}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().from(el).set(opt).save();
            alert("PDF download is gestart!");
        } catch(e) {
            alert("PDF Fout: " + e);
        } finally {
            el.style.display = 'none';
        }
    }

    window.onload = build;
</script>
</body>
</html>
